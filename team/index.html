<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>团队架构 · CYC 工具站</title>
  <link rel="stylesheet" href="/team/styles.css">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ===== Login Screen ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>团队架构管理</h2>
    <p>请输入管理密码以访问</p>
    <div class="input-wrap">
      <input type="password" id="pwd-input" placeholder="••••" maxlength="20"
             inputmode="numeric" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">进入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ===== Main App ===== -->
<div id="app" class="page">

  <div class="header">
    <div>
      <h1>团队<em>架构</em></h1>
      <a href="/" class="back-link">← 返回工具站</a>
    </div>
    <div class="header-actions">
      <span class="edit-badge" id="edit-badge">
        <span class="edit-badge-dot"></span>编辑中
      </span>
      <button class="btn btn-sm btn-orange" id="btn-enter-edit" onclick="enterEditMode()">编辑</button>
      <button class="btn btn-sm btn-outline" id="btn-exit-edit" style="display:none;" onclick="exitEditMode()">退出编辑</button>
      <button class="btn btn-sm btn-outline" onclick="doLogout()">退出</button>
    </div>
  </div>

  <!-- ===== 本周驻店轮值 (TOP) ===== -->
  <div class="section">
    <div class="section-header">
      <p class="section-title" style="margin-bottom:0;">驻店轮值</p>
    </div>

    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)">‹ 上周</button>
      <span class="week-range" id="wkRange"></span>
      <button class="nav-btn" onclick="changeWeek(1)">下周 ›</button>
    </div>

    <div class="week-strip" id="wkStrip"></div>

    <div id="schedule-body"></div>

    <p class="schedule-hint">← 左右滑动查看完整排班</p>
  </div>

  <!-- ===== CYC 铁三角 ===== -->
  <div class="section">
    <div class="section-header">
      <span class="community-badge badge-cyc">
        <span class="community-dot dot-green"></span>
        CYC 链岛青年社区
      </span>
    </div>
    <p class="section-title">铁三角 · 核心治理</p>
    <div class="triangle-grid" id="cyc-triangle"></div>
  </div>

  <!-- CYC 运营层 -->
  <div class="section">
    <p class="section-title">运营层</p>
    <div class="role-group" id="cyc-ops"></div>
  </div>

  <!-- CYC 义工 -->
  <div class="section">
    <p class="section-title">CYC 社区义工</p>
    <div class="volunteer-grid" id="cyc-volunteers"></div>
  </div>

  <!-- ===== Praxis Hub ===== -->
  <div class="section" style="margin-top: 36px;">
    <div class="section-header">
      <span class="community-badge badge-praxis">
        <span class="community-dot dot-orange"></span>
        Praxis Hub · P社
      </span>
    </div>
    <p class="section-title">主理人</p>
    <div class="role-group" id="praxis-lead"></div>
  </div>

  <div class="section">
    <p class="section-title">P社义工</p>
    <div class="volunteer-grid" id="praxis-volunteers"></div>
  </div>

  <!-- ===== 社区代表 ===== -->
  <div class="section" style="margin-top: 36px;">
    <div class="section-header">
      <span class="section-title" style="margin-bottom: 0;">社区代表</span>
      <button class="btn btn-sm btn-orange edit-only" onclick="openAddRep()">+ 添加</button>
    </div>
    <div class="rep-list" id="reps-list"></div>
    <div id="reps-empty" style="font-size: 13px; color: var(--muted); padding: 16px 0; text-align: center;">
      暂无社区代表
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-dot"></span>
      <span class="footer-text">cyc.center · 团队架构</span>
    </div>
  </footer>
</div>

<!-- ===== Detail / Edit Modal ===== -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ===== Edit Password Modal ===== -->
<div class="modal-overlay" id="edit-pwd-modal">
  <div class="modal-sheet" style="max-width: 360px;">
    <div class="modal-handle"></div>
    <div class="modal-title">输入编辑密码</div>
    <div class="form-group">
      <input type="password" class="form-input" id="edit-pwd-input"
             placeholder="请输入管理密码" style="text-align:center; letter-spacing:0.2em; font-weight:600;"
             autocomplete="off">
    </div>
    <div class="login-error" id="edit-pwd-error" style="text-align:center;"></div>
    <div class="modal-actions">
      <button class="btn btn-sm btn-outline" onclick="closeEditPwdModal()">取消</button>
      <button class="btn btn-sm btn-primary" id="edit-pwd-btn" onclick="verifyEditPwd()">验证</button>
    </div>
  </div>
</div>

<!-- ===== Change Sync Password Modal (悠洋专用) ===== -->
<div class="modal-overlay" id="change-pwd-modal">
  <div class="modal-sheet" style="max-width: 380px;">
    <div class="modal-handle"></div>
    <div class="modal-title">🔑 修改活动通告密码</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.55;">
      此密码用于在主页录入和修改飞书活动记录。修改后所有用户都需要使用新密码。
    </p>
    <div class="form-group">
      <label class="form-label">当前密码</label>
      <input type="text" class="form-input pwd-mask" id="cp-current"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label class="form-label">新密码（至少 2 个字符，支持中文）</label>
      <input type="text" class="form-input pwd-mask" id="cp-new"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label class="form-label">再次输入新密码</label>
      <input type="text" class="form-input pwd-mask" id="cp-confirm"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="login-error" id="cp-error" style="text-align:center;min-height:18px;"></div>
    <div class="modal-actions">
      <button class="btn btn-sm btn-outline" onclick="closeChangePwdModal()">取消</button>
      <button class="btn btn-sm btn-primary" id="cp-submit" onclick="submitChangePassword()">确认修改</button>
    </div>
  </div>
</div>

<!-- ===== 成员选择器（B 战役 picker） ===== -->
<div class="modal-overlay" id="picker-modal">
  <div class="modal-sheet picker-modal">
    <div class="modal-handle"></div>
    <div class="picker-head">
      <div class="picker-title">🔗 选择社区成员</div>
      <button class="picker-close-btn" onclick="closePicker()" aria-label="关闭">✕</button>
    </div>
    <div class="picker-search-wrap">
      <input class="picker-search" id="picker-search" type="text" placeholder="搜索姓名 / 称呼 / 城市..."
             autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="picker-list" id="picker-list">
      <div class="picker-loading">⏳ 加载中…</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════
const CN_DAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const today = new Date(); today.setHours(0,0,0,0);

// ═══════════════════════════════════════════
// Default Data
// ═══════════════════════════════════════════
const DEFAULT_DATA = {
  cyc: {
    triangle: [
      { role: '资源与治理层', name: '方荣', desc: '资源整合、战略方向、对外关系', jd: '', bio: '', since: '', avatar: '' },
      { role: '物业层', name: '月汐', desc: '空间管理、物业运营、后勤保障', jd: '', bio: '', since: '', avatar: '' },
      { role: '社区层', name: '悠洋', desc: '社区运营、活动策划、居民关系', jd: '', bio: '', since: '', avatar: '' }
    ],
    ops: [
      { role: '物业OTA商业负责人', name: '千帆', desc: '民宿运营、OTA平台管理', jd: '', bio: '', since: '', avatar: '' },
      { role: 'CYC社区店长', name: '梁欢', desc: '社区空间日常管理', jd: '', bio: '', since: '', avatar: '' },
      { role: '新媒体和协作管理', name: '鸭脖', desc: '新媒体运营、团队协作管理', jd: '', bio: '', since: '', avatar: '' },
      { role: '轮值活动主理人', name: '', desc: '当月活动总负责（按月轮换）', jd: '', bio: '', since: '', avatar: '' }
    ],
    volunteers: [
      { emoji: '📱', name: '', title: '多平台运营信息同步', keywords: ['协调','响应','润滑'], desc: '各平台信息同步、社群消息协调与响应', jd: '', bio: '', since: '', avatar: '' },
      { emoji: '📦', name: '', title: '物业库管数据管理', keywords: ['出入登记','安全','资产'], desc: '物品出入登记、安全管理、资产盘点', jd: '', bio: '', since: '', avatar: '' },
      { emoji: '🎨', name: '', title: '视觉品牌设计与流程优化', keywords: ['设计','文案','开发'], desc: '视觉设计、文案输出、流程工具开发', jd: '', bio: '', since: '', avatar: '' },
      { emoji: '📸', name: '', title: '拍摄与自媒体协调', keywords: ['现场','记录','连接'], desc: '活动现场拍摄、内容记录与自媒体对接', jd: '', bio: '', since: '', avatar: '' }
    ]
  },
  praxis: {
    lead: { role: '主理人', name: 'Demian', desc: 'Praxis Hub 社区主理', jd: '', bio: '', since: '', avatar: '' },
    volunteers: [
      { emoji: '🔧', name: '', title: '方向一', keywords: [], desc: '待定', jd: '', bio: '', since: '', avatar: '' },
      { emoji: '🌐', name: '', title: '方向二', keywords: [], desc: '待定', jd: '', bio: '', since: '', avatar: '' },
      { emoji: '💡', name: '', title: '方向三', keywords: [], desc: '待定', jd: '', bio: '', since: '', avatar: '' }
    ]
  },
  reps: [],
  schedule: {}
};

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let data = {};
let editMode = false;
let wkOffset = 0;
// 成员池缓存（B 战役：team ↔ member 联动）
//   _membersById: { rec_id → 成员对象 }，null 代表还没拉过
//   _membersList: 同样数据但是数组，picker 列表用，按姓名排序
let _membersById = null;
let _membersList = [];
let _membersErr  = null;

function loadData() {
  const saved = localStorage.getItem('cyc-team-data');
  if (saved) {
    try { data = JSON.parse(saved); } catch { data = structuredClone(DEFAULT_DATA); }
  } else {
    data = structuredClone(DEFAULT_DATA);
  }
  if (!data.reps) data.reps = [];
  if (!data.schedule) data.schedule = {};
  // Migrate old array-based schedule
  if (data.schedule.days && Array.isArray(data.schedule.days)) {
    data.schedule = {};
  }
  // Migrate: ensure detail fields exist
  const addFields = obj => {
    if (!obj.jd && obj.jd !== '') obj.jd = '';
    if (!obj.bio && obj.bio !== '') obj.bio = '';
    if (!obj.since && obj.since !== '') obj.since = '';
    if (!obj.avatar && obj.avatar !== '') obj.avatar = '';
    // B 战役：关联到社区成员池的 record_id（空 = 未关联，沿用本地字段）
    if (typeof obj.member_rec_id !== 'string') obj.member_rec_id = '';
  };
  data.cyc.triangle.forEach(addFields);
  data.cyc.ops.forEach(addFields);
  data.cyc.volunteers.forEach(addFields);
  addFields(data.praxis.lead);
  data.praxis.volunteers.forEach(addFields);
  // Migrate: add new ops
  if (data.cyc.ops.length < 4) {
    const existingRoles = data.cyc.ops.map(o => o.role);
    DEFAULT_DATA.cyc.ops.forEach(op => {
      if (!existingRoles.includes(op.role)) data.cyc.ops.push({ ...op });
    });
  }
}

function saveData() { localStorage.setItem('cyc-team-data', JSON.stringify(data)); }

// ═══════════════════════════════════════════
// Date helpers (same pattern as activity calendar)
// ═══════════════════════════════════════════
function fmt(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function getMonStart(off) {
  const d = new Date(today);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + off * 7);
  return d;
}

function dayLabel(d) {
  const f = new Date(d); f.setHours(0,0,0,0);
  const tom = new Date(today); tom.setDate(today.getDate()+1);
  if (f.getTime() === today.getTime()) return '今天';
  if (f.getTime() === tom.getTime()) return '明天';
  return '';
}

// ═══════════════════════════════════════════
// Auth
// ═══════════════════════════════════════════
function checkSession() {
  if (sessionStorage.getItem('cyc-team-auth') === '1') showApp();
}

async function doLogin() {
  const pwd = document.getElementById('pwd-input').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!pwd) { errEl.textContent = '请输入密码'; return; }
  btn.textContent = '验证中...'; btn.disabled = true;
  try {
    const res = await fetch('/api/team-auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const json = await res.json();
    if (res.ok && json.success) {
      sessionStorage.setItem('cyc-team-auth', '1');
      sessionStorage.setItem('cyc-team-pwd',  pwd);  // B 战役：API 调用要用
      showApp();
    } else { errEl.textContent = json.error || '密码错误'; }
  } catch { errEl.textContent = '网络错误，请重试'; }
  btn.textContent = '进入'; btn.disabled = false;
}

function doLogout() {
  sessionStorage.removeItem('cyc-team-auth');
  sessionStorage.removeItem('cyc-team-edit');
  sessionStorage.removeItem('cyc-team-pwd');
  editMode = false;
  _membersById = null; _membersList = []; _membersErr = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

/** 拉成员池（懒加载，登录后预热一次；picker 打开时若未就绪再触发） */
async function loadMembers(force = false) {
  if (_membersById !== null && !force) return _membersById;
  const pwd = sessionStorage.getItem('cyc-team-pwd');
  if (!pwd) {
    _membersErr = '会话已过期，请重新登录';
    return null;
  }
  try {
    const res = await fetch('/api/members', {
      headers: { 'Authorization': 'Bearer ' + pwd },
    });
    if (res.status === 401) {
      sessionStorage.removeItem('cyc-team-pwd');
      _membersErr = '密码已变更，请重新登录';
      return null;
    }
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '加载失败');

    _membersList = json.members;
    _membersById = {};
    for (const m of json.members) _membersById[m.record_id] = m;
    _membersErr = null;
    return _membersById;
  } catch (err) {
    _membersErr = err.message || '网络错误';
    return null;
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (sessionStorage.getItem('cyc-team-edit') === '1') { editMode = true; applyEditMode(); }
  loadData(); render();
  // 后台预热成员池（不阻塞 UI；详情卡渲染时若已就绪可直接拿用）
  loadMembers().then(() => render());
}

document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ═══════════════════════════════════════════
// Edit Mode
// ═══════════════════════════════════════════
function enterEditMode() {
  document.getElementById('edit-pwd-modal').classList.add('active');
  document.getElementById('edit-pwd-input').value = '';
  document.getElementById('edit-pwd-error').textContent = '';
  setTimeout(() => document.getElementById('edit-pwd-input').focus(), 300);
}

document.getElementById('edit-pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') verifyEditPwd(); });

async function verifyEditPwd() {
  const pwd = document.getElementById('edit-pwd-input').value.trim();
  const errEl = document.getElementById('edit-pwd-error');
  const btn = document.getElementById('edit-pwd-btn');
  if (!pwd) { errEl.textContent = '请输入密码'; return; }
  btn.textContent = '验证中...'; btn.disabled = true;
  try {
    const res = await fetch('/api/team-auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const json = await res.json();
    if (res.ok && json.success) {
      editMode = true;
      sessionStorage.setItem('cyc-team-edit', '1');
      sessionStorage.setItem('cyc-team-pwd',  pwd);  // B 战役：保险（doLogin 已存过，但万一刷新过会话）
      closeEditPwdModal(); applyEditMode(); render();
    } else { errEl.textContent = json.error || '密码错误'; }
  } catch { errEl.textContent = '网络错误'; }
  btn.textContent = '验证'; btn.disabled = false;
}

function closeEditPwdModal() { document.getElementById('edit-pwd-modal').classList.remove('active'); }
document.getElementById('edit-pwd-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditPwdModal(); });

function exitEditMode() { editMode = false; sessionStorage.removeItem('cyc-team-edit'); applyEditMode(); render(); }

function applyEditMode() {
  const app = document.getElementById('app');
  const badge = document.getElementById('edit-badge');
  const btnEnter = document.getElementById('btn-enter-edit');
  const btnExit = document.getElementById('btn-exit-edit');
  if (editMode) {
    app.classList.add('edit-active'); badge.classList.add('active');
    btnEnter.style.display = 'none'; btnExit.style.display = 'inline-flex';
  } else {
    app.classList.remove('edit-active'); badge.classList.remove('active');
    btnEnter.style.display = 'inline-flex'; btnExit.style.display = 'none';
  }
}

// ═══════════════════════════════════════════
// Schedule
// ═══════════════════════════════════════════
function getScheduleOptions() {
  const names = [];
  data.cyc.volunteers.forEach(v => { if (v.name) names.push(v.name); });
  data.cyc.ops.forEach(o => { if (o.name) names.push(o.name); });
  return [...new Set(names)];
}

function getSchedKey(dateStr, shift) { return dateStr + '_' + shift; }

function changeWeek(d) { wkOffset += d; renderWeekStrip(); renderSchedule(); }

function renderWeekStrip() {
  const s = getMonStart(wkOffset), e = new Date(s); e.setDate(s.getDate() + 6);
  document.getElementById('wkRange').textContent =
    (s.getMonth()+1) + '月' + s.getDate() + '日 — ' + (e.getMonth()+1) + '月' + e.getDate() + '日';

  const strip = document.getElementById('wkStrip');
  strip.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(s); d.setDate(s.getDate() + i);
    const isToday = d.getTime() === today.getTime();
    const tag = dayLabel(d);
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' is-today' : '');
    cell.innerHTML =
      '<span class="day-name">' + CN_DAYS[d.getDay()] + '</span>' +
      '<span class="day-num">' + d.getDate() + '</span>' +
      '<span class="day-tag">' + (tag || '') + '</span>';
    strip.appendChild(cell);
  }
}

function renderSchedule() {
  const s = getMonStart(wkOffset);
  const options = getScheduleOptions();
  const body = document.getElementById('schedule-body');

  let html = '<div class="sched-table">';

  // AM row
  html += '<div class="sched-table-row">';
  html += '<div class="sched-table-label">☀️<br>10–16</div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(s); d.setDate(s.getDate() + i);
    const key = getSchedKey(fmt(d), 'am');
    const val = data.schedule[key] || '';
    const isToday = d.getTime() === today.getTime();
    html += '<div class="sched-cell' + (isToday ? ' is-today' : '') + '">';
    if (editMode) {
      html += buildSelect(key, val, options);
    } else {
      html += val || '<span class="empty-slot">—</span>';
    }
    html += '</div>';
  }
  html += '</div>';

  // PM row
  html += '<div class="sched-table-row">';
  html += '<div class="sched-table-label">🌙<br>16–22</div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(s); d.setDate(s.getDate() + i);
    const key = getSchedKey(fmt(d), 'pm');
    const val = data.schedule[key] || '';
    const isToday = d.getTime() === today.getTime();
    html += '<div class="sched-cell' + (isToday ? ' is-today' : '') + '">';
    if (editMode) {
      html += buildSelect(key, val, options);
    } else {
      html += val || '<span class="empty-slot">—</span>';
    }
    html += '</div>';
  }
  html += '</div></div>';

  body.innerHTML = html;
}

function buildSelect(key, val, options) {
  let opts = '<option value="">—</option>';
  options.forEach(n => { opts += `<option value="${n}" ${n===val?'selected':''}>${n}</option>`; });
  if (val && !options.includes(val)) opts += `<option value="${val}" selected>${val}</option>`;
  return `<select class="schedule-select" onchange="setSchedule('${key}', this.value)">${opts}</select>`;
}

function setSchedule(key, value) {
  if (value) { data.schedule[key] = value; } else { delete data.schedule[key]; }
  saveData();
}

function getItem(path, idx) {
  const parts = path.split('.');
  let obj = data;
  for (const p of parts) obj = obj[p];
  return idx !== null && idx !== undefined ? obj[idx] : obj;
}

function openDetail(path, idx) {

function saveDetail(path, idx) {
  const item = getItem(path, idx);
  const isVolunteer = path.includes('volunteers');
  const isRep = path === 'reps';

  if (isRep) {
    item.type = document.getElementById('df-type').value.trim();
    item.name = document.getElementById('df-name').value.trim();
    item.desc = document.getElementById('df-desc').value.trim();
    if (!item.name) { alert('请填写姓名'); return; }
  } else if (isVolunteer) {
    item.emoji = document.getElementById('df-emoji').value.trim();
    item.name = document.getElementById('df-name').value.trim();
    item.title = document.getElementById('df-title').value.trim();
    const kwStr = document.getElementById('df-keywords').value.trim();
    item.keywords = kwStr ? kwStr.split(/[,，、]/).map(s => s.trim()).filter(Boolean) : [];
    item.desc = document.getElementById('df-desc').value.trim();
  } else {
    if (document.getElementById('df-role')) item.role = document.getElementById('df-role').value.trim();
    item.name = document.getElementById('df-name').value.trim();
    item.desc = document.getElementById('df-desc').value.trim();
  }

  if (!isRep) {
    item.avatar = document.getElementById('df-avatar').value.trim();
    item.jd = document.getElementById('df-jd').value.trim();
    item.bio = document.getElementById('df-bio').value.trim();
    item.since = document.getElementById('df-since').value.trim();
  }

  saveData(); render(); closeDetail();
}

function deleteRep(idx) {
  data.reps.splice(idx, 1);
  saveData(); render(); closeDetail();
}

function openAddRep() {
  if (!editMode) return;
  data.reps.push({ type: '', name: '新代表', desc: '' });
  saveData(); render();
  openDetail('reps', data.reps.length - 1);
}

function closeDetail() { document.getElementById('detail-modal').classList.remove('active'); }

document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

// ═══════════════════════════════════════════
// 修改活动通告密码（悠洋专用）
// ═══════════════════════════════════════════
function openChangePwdModal() {
  closeDetail();
  ['cp-current','cp-new','cp-confirm'].forEach(id => document.getElementById(id).value = '');
  const err = document.getElementById('cp-error');
  err.textContent = '';
  err.classList.remove('cp-status-ok','cp-status-err');
  document.getElementById('cp-submit').textContent = '确认修改';
  document.getElementById('cp-submit').disabled = false;
  setTimeout(() => {
    document.getElementById('change-pwd-modal').classList.add('active');
    setTimeout(() => document.getElementById('cp-current').focus(), 250);
  }, 200);
}

function closeChangePwdModal() {
  document.getElementById('change-pwd-modal').classList.remove('active');
}

document.getElementById('change-pwd-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeChangePwdModal();
});

['cp-current','cp-new','cp-confirm'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') submitChangePassword();
  });
});

async function submitChangePassword() {
  const current = document.getElementById('cp-current').value.trim();
  const newPwd  = document.getElementById('cp-new').value.trim();
  const confirm = document.getElementById('cp-confirm').value.trim();
  const errEl   = document.getElementById('cp-error');
  const btn     = document.getElementById('cp-submit');

  errEl.classList.remove('cp-status-ok','cp-status-err');

  if (!current || !newPwd || !confirm) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '请填写完整三个密码';
    return;
  }
  if (newPwd !== confirm) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '两次输入的新密码不一致';
    return;
  }
  if (newPwd.length < 2) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '新密码至少 2 个字符';
    return;
  }
  if (newPwd === current) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '新密码不能与当前密码相同';
    return;
  }

  btn.textContent = '修改中...';
  btn.disabled    = true;
  errEl.textContent = '';

  try {
    const res = await fetch('/api/team-auth?action=change-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ currentPassword: current, newPassword: newPwd }),
    });
    const data = await res.json();

    if (res.ok && data.success) {
      // 清掉本会话缓存的同步密码（让用户下次同步时重新输入）
      try { sessionStorage.removeItem('cyc_sync_pwd'); } catch {}
      errEl.classList.add('cp-status-ok');
      errEl.textContent = '✓ 修改成功！请通知团队使用新密码';
      btn.textContent = '已成功';
      setTimeout(closeChangePwdModal, 1800);
      setTimeout(() => {
        btn.textContent = '确认修改';
        btn.disabled = false;
      }, 2200);
    } else {
      errEl.classList.add('cp-status-err');
      errEl.textContent = data.error || '修改失败';
      btn.textContent = '确认修改';
      btn.disabled    = false;
    }
  } catch (err) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '网络错误：' + err.message;
    btn.textContent = '确认修改';
    btn.disabled    = false;
  }
}

// 🔗 B 战役：成员选择器 picker
// ═══════════════════════════════════════════
//   _pickerCtx = { path, idx } — 记住要把选中结果写回哪条角色
//   _pickerFilter — 当前搜索关键字，每次输入触发重渲染
let _pickerCtx    = null;
let _pickerFilter = '';

/** 入口：打开 picker；context 是当前编辑的角色路径（如 'cyc.triangle'）+ index */
function openPicker(path, idx) {
  _pickerCtx = { path, idx };
  _pickerFilter = '';
  document.getElementById('picker-search').value = '';
  document.getElementById('picker-modal').classList.add('active');
  setTimeout(() => document.getElementById('picker-search').focus(), 250);
  renderPicker();
  // 没拉过则现拉
  if (_membersById === null) {
    loadMembers().then(() => renderPicker());
  }
}

function closePicker() {
  document.getElementById('picker-modal').classList.remove('active');
  _pickerCtx = null;
}

document.getElementById('picker-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePicker();
});

document.getElementById('picker-search').addEventListener('input', e => {
  _pickerFilter = (e.target.value || '').trim().toLowerCase();
  renderPicker();
});

function renderPicker() {
  const listEl = document.getElementById('picker-list');

  // 加载状态
  if (_membersById === null) {
    listEl.innerHTML = '<div class="picker-loading">⏳ 加载成员池…</div>';
    return;
  }

  // 错误状态
  if (_membersErr) {
    listEl.innerHTML = '<div class="picker-error">😕 ' + escTeamHtml(_membersErr) + '<br><br>'
      + '<button class="btn btn-sm btn-outline" onclick="loadMembers(true).then(()=>renderPicker())">重试</button></div>';
    return;
  }

  if (!_membersList.length) {
    listEl.innerHTML = '<div class="picker-empty">🌿 成员池为空</div>';
    return;
  }

  const currentItem = _pickerCtx ? getItem(_pickerCtx.path, _pickerCtx.idx) : null;
  const currentRid  = currentItem?.member_rec_id || '';

  // 过滤
  const f = _pickerFilter;
  const filtered = !f ? _membersList : _membersList.filter(m => {
    const hay = ((m.name || '') + ' ' + (m.nickname || '') + ' ' + (m.cities || []).join(' ')).toLowerCase();
    return hay.includes(f);
  });

  let html = '';
  // 「无人担任 / 解除关联」选项放最上
  if (currentRid) {
    html += '<div class="picker-row is-clear" onclick="pickerSelect(\'\')">'
      + '<div class="picker-avatar">∅</div>'
      + '<div class="picker-row-info">'
        + '<div class="picker-row-name">解除关联（角色变为空缺）</div>'
        + '<div class="picker-row-meta">不与任何成员绑定</div>'
      + '</div>'
    + '</div>';
  }

  if (!filtered.length) {
    html += '<div class="picker-empty">没有匹配的成员</div>';
  } else {
    for (const m of filtered) {
      const isCurrent = m.record_id === currentRid;
      const displayName = m.name || m.nickname || '（未填姓名）';
      const meta = [
        m.nickname && m.nickname !== m.name ? '“' + m.nickname + '”' : '',
        (m.cities || []).join(' / '),
        (m.bio || '').slice(0, 30) + ((m.bio || '').length > 30 ? '…' : ''),
      ].filter(Boolean).join(' · ');
      const avatarHtml = m.avatar_token
        ? '<img src="/api/poster?token=' + encodeURIComponent(m.avatar_token) + '" onerror="this.style.display=\'none\';this.parentNode.textContent=\'👤\'">'
        : '👤';
      html += '<div class="picker-row' + (isCurrent ? ' is-current' : '') + '" onclick="pickerSelect(\'' + m.record_id + '\')">'
        + '<div class="picker-avatar">' + avatarHtml + '</div>'
        + '<div class="picker-row-info">'
          + '<div class="picker-row-name">' + escTeamHtml(displayName) + (isCurrent ? ' <span style="color:var(--orange);font-size:11px">· 当前</span>' : '') + '</div>'
          + (meta ? '<div class="picker-row-meta">' + escTeamHtml(meta) + '</div>' : '')
        + '</div>'
      + '</div>';
    }
  }
  listEl.innerHTML = html;
}

/** 选中某个成员（或传空字符串清除关联）→ 写回 data + 重新渲染详情 */
function pickerSelect(recId) {
  if (!_pickerCtx) return;
  const item = getItem(_pickerCtx.path, _pickerCtx.idx);
  if (!item) return;
  item.member_rec_id = recId || '';
  // 关联成员后，把成员的 name 同步到 item.name（保险，反正 view 会优先读 member.name）
  if (recId && _membersById && _membersById[recId]) {
    const m = _membersById[recId];
    item.name = m.name || m.nickname || item.name || '';
  }
  saveData();
  closePicker();
  // 重新打开当前条目的编辑卡（让用户立刻看到关联结果）
  openDetail(_pickerCtx.path, _pickerCtx.idx);
}

/** 简单 HTML escape，避免成员姓名 / bio 含 < > & 等字符破坏渲染 */
function escTeamHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/** 编辑卡里的「已关联成员」小卡（不带按钮，按钮在外面） */
function renderLinkedMemberCard(m) {
  const avatarHtml = m.avatar_token
    ? '<img src="/api/poster?token=' + encodeURIComponent(m.avatar_token) + '" onerror="this.style.display=\'none\';this.parentNode.textContent=\'👤\'">'
    : '👤';
  const meta = [
    (m.cities || []).join(' / '),
    (m.bio || '').slice(0, 50) + ((m.bio || '').length > 50 ? '…' : ''),
  ].filter(Boolean).join(' · ');
  return '<div class="linked-member">'
    + '<div class="linked-member-avatar">' + avatarHtml + '</div>'
    + '<div class="linked-member-info">'
      + '<div class="linked-member-name">' + escTeamHtml(m.name || m.nickname || '') + '</div>'
      + (meta ? '<div class="linked-member-meta">' + escTeamHtml(meta) + '</div>' : '')
    + '</div>'
  + '</div>';
}

/** 直接解除关联（不弹 picker） */
function clearMemberLink(path, idx) {
  const item = getItem(path, idx);
  if (!item) return;
  item.member_rec_id = '';
  saveData();
  openDetail(path, idx);  // 刷新当前详情卡
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
checkSession();
</script>
