<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>团队架构 · CYC 工具站</title>
  <link rel="stylesheet" href="/team/styles.css">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ===== Login Screen ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>团队架构管理</h2>
    <p>请输入管理密码以访问</p>
    <div class="input-wrap">
      <input type="password" id="pwd-input" placeholder="••••" maxlength="20"
             inputmode="numeric" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">进入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ===== Main App ===== -->
<div id="app" class="page">

  <div class="header">
    <div>
      <h1>团队<em>架构</em></h1>
      <a href="/" class="back-link">← 返回工具站</a>
    </div>
    <div class="header-actions">
      <span class="edit-badge" id="edit-badge">
        <span class="edit-badge-dot"></span>编辑中
      </span>
      <button class="btn btn-sm btn-orange" id="btn-enter-edit" onclick="enterEditMode()">编辑</button>
      <button class="btn btn-sm btn-outline" id="btn-exit-edit" style="display:none;" onclick="exitEditMode()">退出编辑</button>
      <button class="btn btn-sm btn-outline" onclick="doLogout()">退出</button>
    </div>
  </div>

  <!-- ===== 【0】团队现状总览 (v1.1) ===== -->
  <div class="section" id="v2-status"></div>

  <!-- ===== 【1】驻店轮值 ===== -->
  <div class="section">
    <div class="section-header">
      <p class="section-title" style="margin-bottom:0;">驻店轮值</p>
    </div>

    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)">‹ 上周</button>
      <span class="week-range" id="wkRange"></span>
      <button class="nav-btn" onclick="changeWeek(1)">下周 ›</button>
    </div>

    <div class="week-strip" id="wkStrip"></div>

    <div id="schedule-body"></div>

    <p class="schedule-hint">← 左右滑动查看完整排班</p>
  </div>

  <!-- ===== 【2】业主 + 法人 ===== -->
  <div class="section" id="v2-ownership"></div>

  <!-- ===== 【3】当下核心团队 ===== -->
  <div class="section" id="v2-coreteam"></div>

  <!-- ===== 【4】CYC 链岛酒店团队 · 招募中 ===== -->
  <div class="section" id="v2-hotel"></div>

  <!-- ===== 【5】社区团队 ===== -->
  <div class="section" id="v2-community"></div>

  <!-- ===== 【6】接下来 2 个月 · 活动 Roadmap ===== -->
  <div class="section" id="v2-roadmap"></div>

  <!-- ===== 【7】5 共建组 ===== -->
  <div class="section" id="v2-groups"></div>

  <!-- ===== 【8】过渡 / 离任记录 ===== -->
  <div class="section" id="v2-departures"></div>

  <!-- ===== 【9】业主代表 / 访客登记 ===== -->
  <div class="section" id="v2-reps"></div>

  <!-- legacy DOM 占位（v1.0 渲染节点保留为隐藏 fallback，避免老 render 函数 crash） -->
  <div style="display:none">
    <div id="cyc-triangle"></div>
    <div id="cyc-ops"></div>
    <div id="cyc-volunteers"></div>
    <div id="praxis-lead"></div>
    <div id="praxis-volunteers"></div>
    <div id="reps-list"></div>
    <div id="reps-empty"></div>
  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-dot"></span>
      <span class="footer-text">cyc.center · 团队架构</span>
    </div>

<!-- ===== Detail / Edit Modal ===== -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ===== Edit Password Modal ===== -->
<div class="modal-overlay" id="edit-pwd-modal">
  <div class="modal-sheet" style="max-width: 360px;">
    <div class="modal-handle"></div>
    <div class="modal-title">输入编辑密码</div>
    <div class="form-group">
      <input type="password" class="form-input" id="edit-pwd-input"
             placeholder="请输入管理密码" style="text-align:center; letter-spacing:0.2em; font-weight:600;"
             autocomplete="off">
    </div>
    <div class="login-error" id="edit-pwd-error" style="text-align:center;"></div>
    <div class="modal-actions">
      <button class="btn btn-sm btn-outline" onclick="closeEditPwdModal()">取消</button>
      <button class="btn btn-sm btn-primary" id="edit-pwd-btn" onclick="verifyEditPwd()">验证</button>
    </div>
  </div>
</div>

<!-- ===== Change Sync Password Modal (悠洋专用) ===== -->
<div class="modal-overlay" id="change-pwd-modal">
  <div class="modal-sheet" style="max-width: 380px;">
    <div class="modal-handle"></div>
    <div class="modal-title">🔑 修改活动通告密码</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.55;">
      此密码用于在主页录入和修改飞书活动记录。修改后所有用户都需要使用新密码。
    </p>
    <div class="form-group">
      <label class="form-label">当前密码</label>
      <input type="text" class="form-input pwd-mask" id="cp-current"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label class="form-label">新密码（至少 2 个字符，支持中文）</label>
      <input type="text" class="form-input pwd-mask" id="cp-new"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label class="form-label">再次输入新密码</label>
      <input type="text" class="form-input pwd-mask" id="cp-confirm"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="login-error" id="cp-error" style="text-align:center;min-height:18px;"></div>
    <div class="modal-actions">
      <button class="btn btn-sm btn-outline" onclick="closeChangePwdModal()">取消</button>
      <button class="btn btn-sm btn-primary" id="cp-submit" onclick="submitChangePassword()">确认修改</button>
    </div>
  </div>
</div>

function loadData() {
  // Phase B: data 直接是 v1.1 新 shape
  //   1. 优先从 v2 key 加载（v1.1 已存在）
  //   2. 否则: 加载 legacy v1.0 数据 → migrate → 写入 v2 key
  //   3. 老 'cyc-team-data' 永远不被覆盖（rollback safety）

  // Step 1: 尝试 v2 key
  const v2Saved = localStorage.getItem(STORAGE_KEY_V2);
  if (v2Saved) {
    try {
      const parsed = JSON.parse(v2Saved);
      if (parsed && parsed.schemaVersion === SCHEMA_VERSION) {
        data = parsed;
        if (!data.schedule)       data.schedule = {};
        if (!data.ownershipReps)  data.ownershipReps = [];
        window.__cycV2Data = data;
        return;
      }
    } catch { /* fall through */ }
  }

  // Step 2: 加载 + 清洗 legacy v1.0 shape
  let legacy;
  const saved = localStorage.getItem('cyc-team-data');
  if (saved) {
    try { legacy = JSON.parse(saved); } catch { legacy = structuredClone(DEFAULT_DATA); }
  } else {
    legacy = structuredClone(DEFAULT_DATA);
  }
  if (!legacy.reps) legacy.reps = [];
  if (!legacy.schedule) legacy.schedule = {};
  if (legacy.schedule.days && Array.isArray(legacy.schedule.days)) legacy.schedule = {};

  const addFields = obj => {
    if (!obj) return;
    if (!obj.jd && obj.jd !== '') obj.jd = '';
    if (!obj.bio && obj.bio !== '') obj.bio = '';
    if (!obj.since && obj.since !== '') obj.since = '';
    if (!obj.avatar && obj.avatar !== '') obj.avatar = '';
    if (typeof obj.member_rec_id !== 'string') obj.member_rec_id = '';
  };
  (legacy.cyc?.triangle  || []).forEach(addFields);
  (legacy.cyc?.ops       || []).forEach(addFields);
  (legacy.cyc?.volunteers|| []).forEach(addFields);
  if (legacy.praxis?.lead) addFields(legacy.praxis.lead);
  (legacy.praxis?.volunteers || []).forEach(addFields);

  // Step 3: 迁移到 v2 shape，作为 data
  data = migrateOldToNew(legacy);
  localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(data));
  window.__cycV2Data = data;

  console.info(
    '%c📦 CYC /team v1.1 Phase B · UI 已切换到新结构',
    'background:#1c3d2e;color:#fff;padding:3px 8px;border-radius:4px;font-weight:600;',

// ═══════════════════════════════════════════
// v1.1 migration · old shape → new shape
//   Phase A: 只生成 + 存到 v2 key + 暴露 window.__cycV2
//   不接管渲染（UI 仍用 DEFAULT_DATA shape）
// ═══════════════════════════════════════════
function migrateOldToNew(oldData) {
  const oldTri  = oldData?.cyc?.triangle || [];
  const oldOps  = oldData?.cyc?.ops      || [];
  const oldPxs  = oldData?.praxis        || {};

  // helpers: 按 name / role 在旧结构中找
  const findByName = (arr, n) => arr.find(x => x && x.name === n) || {};
  const findByRole = (arr, r) => arr.find(x => x && x.role === r) || {};

  const youyangOld   = findByName(oldTri, '悠洋');
  const yuexiOld     = findByName(oldTri, '月汐');
  const fangrongOld  = findByName(oldTri, '方荣');
  const yabboOld     = findByRole(oldOps, '新媒体和协作管理');
  const qianfanOld   = findByRole(oldOps, '物业OTA商业负责人');
  const lianghuanOld = findByRole(oldOps, 'CYC社区店长');

  // 深拷贝模板，避免引用污染
  const tpl = JSON.parse(JSON.stringify(NEW_DEFAULT_DATA));

  // 业主代表（方荣）合并旧数据
  if (fangrongOld.name) {
    tpl.ownership.parent.rep.name        = fangrongOld.name;
    tpl.ownership.parent.rep.desc        = fangrongOld.desc || tpl.ownership.parent.rep.desc;
    tpl.ownership.parent.rep.member_rec_id = fangrongOld.member_rec_id || '';
    if (fangrongOld.bio)    tpl.ownership.parent.rep.bio    = fangrongOld.bio;
    if (fangrongOld.avatar) tpl.ownership.parent.rep.avatar = fangrongOld.avatar;
  }

  // 悠洋（core team · onsite）
  if (youyangOld.name) {
    tpl.coreTeam.onsite.name           = youyangOld.name;
    tpl.coreTeam.onsite.desc           = youyangOld.desc || tpl.coreTeam.onsite.desc;
    tpl.coreTeam.onsite.avatar         = youyangOld.avatar || '';
    tpl.coreTeam.onsite.bio            = youyangOld.bio    || '';
    tpl.coreTeam.onsite.member_rec_id  = youyangOld.member_rec_id || '';
  }

  // Demian（core team · transitionSupport）
  if (oldPxs.lead && oldPxs.lead.name) {
    tpl.coreTeam.transitionSupport.name           = oldPxs.lead.name;
    tpl.coreTeam.transitionSupport.avatar         = oldPxs.lead.avatar || '';
    tpl.coreTeam.transitionSupport.bio            = oldPxs.lead.bio    || '';
    tpl.coreTeam.transitionSupport.member_rec_id  = oldPxs.lead.member_rec_id || '';
  }

  // 鸭脖（community team · 自媒体组组长）
  if (yabboOld.name) {
    tpl.communityTeam[0].name           = yabboOld.name;
    tpl.communityTeam[0].avatar         = yabboOld.avatar || '';
    tpl.communityTeam[0].bio            = yabboOld.bio    || '';
    tpl.communityTeam[0].member_rec_id  = yabboOld.member_rec_id || '';
  }

  // 5 共建组 · 自媒体组 leader = 鸭脖 (sync)
  const mediaGroup = tpl.groups.find(g => g.key === 'media');
  if (mediaGroup && yabboOld.name) {
    mediaGroup.leader.name           = yabboOld.name;
    mediaGroup.leader.member_rec_id  = yabboOld.member_rec_id || '';
  }

  // 离任记录 · 月汐 / 千帆 / 梁欢
  if (yuexiOld.name) {
    tpl.departures[0].name = yuexiOld.name;
    tpl.departures[0].role = yuexiOld.role || tpl.departures[0].role;
    tpl.departures[0].avatar = yuexiOld.avatar || '';
    tpl.departures[0].member_rec_id = yuexiOld.member_rec_id || '';
  }
  if (qianfanOld.name) {
    tpl.departures[1].name = qianfanOld.name;
    tpl.departures[1].role = qianfanOld.role || tpl.departures[1].role;
    tpl.departures[1].avatar = qianfanOld.avatar || '';
    tpl.departures[1].member_rec_id = qianfanOld.member_rec_id || '';
  }
  if (lianghuanOld.name) {
    tpl.departures[2].name = lianghuanOld.name;
    tpl.departures[2].role = lianghuanOld.role || tpl.departures[2].role;
    tpl.departures[2].avatar = lianghuanOld.avatar || '';
    tpl.departures[2].member_rec_id = lianghuanOld.member_rec_id || '';
  }

  // 业主代表列表（原 reps）+ 排班保留
  tpl.ownershipReps = Array.isArray(oldData?.reps) ? oldData.reps : [];
  tpl.schedule      = oldData?.schedule || {};

  return tpl;
}

// Phase A 自动迁移：每次 loadData 之后调用，存到 v2 key，不接管渲染
function runMigrationV2() {
  try {
    const newShape = migrateOldToNew(data);
    localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(newShape));
    window.__cycV2Data = newShape;
    return newShape;
  } catch (e) {
    console.error('[CYC team v1.1 migrate] failed:', e);
    return null;
  }
}

// Date helpers (same pattern as activity calendar)
// ═══════════════════════════════════════════
function fmt(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function getMonStart(off) {
  const d = new Date(today);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + off * 7);
  return d;
}

function dayLabel(d) {
  const f = new Date(d); f.setHours(0,0,0,0);
  const tom = new Date(today); tom.setDate(today.getDate()+1);
  if (f.getTime() === today.getTime()) return '今天';
  if (f.getTime() === tom.getTime()) return '明天';
  return '';
}

async function doLogin() {
  const pwd = document.getElementById('pwd-input').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!pwd) { errEl.textContent = '请输入密码'; return; }
  btn.textContent = '验证中...'; btn.disabled = true;
  try {
    const res = await fetch('/api/team-auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const json = await res.json();
    if (res.ok && json.success) {
      sessionStorage.setItem('cyc-team-auth', '1');
      sessionStorage.setItem('cyc-team-pwd',  pwd);  // B 战役：API 调用要用
      showApp();
    } else { errEl.textContent = json.error || '密码错误'; }
  } catch { errEl.textContent = '网络错误，请重试'; }
  btn.textContent = '进入'; btn.disabled = false;

/** 拉单个成员的完整档案（详情卡用 — bio 完整 + 职业 / 兴趣 / 身份 / 活动记录）
 *  缓存到 _membersFullById；同一 id 并发请求合并到一个 Promise
 *  失败返回 null（调用方 fallback 到精简版） */
async function loadFullMember(rec_id) {
  if (!rec_id) return null;
  if (_membersFullById[rec_id]) return _membersFullById[rec_id];
  if (_loadingFull[rec_id]) return _loadingFull[rec_id];

  const pwd = sessionStorage.getItem('cyc-team-pwd');
  if (!pwd) return null;

  _loadingFull[rec_id] = (async () => {
    try {
      const res = await fetch('/api/member?id=' + encodeURIComponent(rec_id), {
        headers: { 'Authorization': 'Bearer ' + pwd },
      });
      if (!res.ok) return null;
      const json = await res.json();
      if (!json.success || !json.member) return null;
      _membersFullById[rec_id] = json.member;
      return json.member;
    } catch {
      return null;
    } finally {
      delete _loadingFull[rec_id];
    }
  })();
  return _loadingFull[rec_id];
}

/** 批量预热：登录后一次性把所有「已关联到角色」的成员档案都拉下来缓存。
 *  这样用户后续点角色卡基本秒开，不用每次等 200-500ms 单独拉。
 *  接口支持 ?id=rec1,rec2,...（最多 30 个，飞书 fetchMember 30min KV 缓存）。 */
async function preloadLinkedMembers() {
  const ids = new Set();
  const collect = obj => obj && obj.member_rec_id && ids.add(obj.member_rec_id);
  // v1.1 paths
  if (data.ownership && data.ownership.parent) collect(data.ownership.parent.rep);
  if (data.coreTeam) { collect(data.coreTeam.onsite); collect(data.coreTeam.transitionSupport); }
  (data.hotelTeam      || []).forEach(collect);
  (data.communityTeam  || []).forEach(collect);
  (data.groups         || []).forEach(g => g && g.leader && collect(g.leader));
  (data.departures     || []).forEach(collect);
  // legacy fallback（保险，旧数据如果还在）
  if (data.cyc) {
    (data.cyc.triangle || []).forEach(collect);
    (data.cyc.ops || []).forEach(collect);
    (data.cyc.volunteers || []).forEach(collect);
  }
  if (data.praxis) {
    collect(data.praxis.lead);
    (data.praxis.volunteers || []).forEach(collect);
  }
  if (!ids.size) return;

  const idList = [...ids];
  const pwd = sessionStorage.getItem('cyc-team-pwd');
  if (!pwd) return;

  try {
    const res = await fetch('/api/member?id=' + encodeURIComponent(idList.join(',')), {
      headers: { 'Authorization': 'Bearer ' + pwd },
    });
    if (!res.ok) return;
    const json = await res.json();
    const list = Array.isArray(json.members) ? json.members
               : (json.member ? [json.member] : []);
    for (const m of list) _membersFullById[m.record_id] = m;
  } catch (err) {
    console.warn('[preloadLinkedMembers]', err.message);
  }
}

/** 'YYYY-MM-DD' → 友好显示（今年的省年份）；空串保持空 */
function fmtActDate(d) {
  if (!d) return '';
  const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return d;
  const yr = (new Date()).getFullYear();
  if (Number(m[1]) === yr) return Number(m[2]) + '月' + Number(m[3]) + '日';
  return m[1].slice(2) + '年' + Number(m[2]) + '月' + Number(m[3]) + '日';
}

/** 展开/收起活动列表里的多余条目（>8 时显示） */
function toggleMemberActsExpand(btn) {
  const sec = btn.closest('.member-activities-section');
  if (!sec) return;
  const expanded = sec.classList.toggle('is-expanded');
  const more = btn.dataset.more;
  btn.textContent = expanded ? '收起 ▴' : ('展开剩余 ' + more + ' 条 ▾');
}

/** 拉成员池（懒加载，登录后预热一次；picker 打开时若未就绪再触发） */
async function loadMembers(force = false) {
  if (_membersById !== null && !force) return _membersById;
  const pwd = sessionStorage.getItem('cyc-team-pwd');
  if (!pwd) {
    _membersErr = '会话已过期，请重新登录';
    return null;
  }
  try {
    const res = await fetch('/api/members', {
      headers: { 'Authorization': 'Bearer ' + pwd },
    });
    if (res.status === 401) {
      sessionStorage.removeItem('cyc-team-pwd');
      _membersErr = '密码已变更，请重新登录';
      return null;
    }
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '加载失败');

    _membersList = json.members;
    _membersById = {};
    for (const m of json.members) _membersById[m.record_id] = m;
    _membersErr = null;
    return _membersById;
  } catch (err) {
    _membersErr = err.message || '网络错误';
    return null;
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (sessionStorage.getItem('cyc-team-edit') === '1') { editMode = true; applyEditMode(); }
  loadData(); render();
  // 后台预热：先拉成员池（picker 用的精简版）→ 紧接着批量拉所有已关联角色的
  // 完整档案（详情卡用）。两层都不阻塞 UI；用户点角色时多半已经命中缓存。
  loadMembers().then(async () => {
    render();
    await preloadLinkedMembers();
    render();   // 完整档案到位后再渲染一次，让卡片名字 / 头像同步到位
  });
}

// Schedule
// ═══════════════════════════════════════════
function getScheduleOptions() {
  const names = [];
  // v1.1: 用酒店团队 + 社区团队 + 共建组组长 + 核心 2 人 作为排班候选
  if (data.coreTeam) {
    if (data.coreTeam.onsite && data.coreTeam.onsite.name)             names.push(data.coreTeam.onsite.name);
    if (data.coreTeam.transitionSupport && data.coreTeam.transitionSupport.name) names.push(data.coreTeam.transitionSupport.name);
  }
  (data.hotelTeam     || []).forEach(h => { if (h.name) names.push(h.name); });
  (data.communityTeam || []).forEach(c => { if (c.name) names.push(c.name); });
  (data.groups        || []).forEach(g => { if (g.leader && g.leader.name) names.push(g.leader.name); });
  return [...new Set(names)];
}

function getSchedKey(dateStr, shift) { return dateStr + '_' + shift; }

function changeWeek(d) { wkOffset += d; renderWeekStrip(); renderSchedule(); }

function renderWeekStrip() {
  const s = getMonStart(wkOffset), e = new Date(s); e.setDate(s.getDate() + 6);
  document.getElementById('wkRange').textContent =
    (s.getMonth()+1) + '月' + s.getDate() + '日 — ' + (e.getMonth()+1) + '月' + e.getDate() + '日';

  const strip = document.getElementById('wkStrip');
  strip.innerHTML = '';
  // 占位空格——和下方 sched-table-row 的 60px 标签列对齐，
  // 这样上面的「周几」头才能和下面的排班单元格一一对上
  const spacer = document.createElement('div');
  spacer.className = 'day-spacer';
  strip.appendChild(spacer);
  for (let i = 0; i < 7; i++) {
    const d = new Date(s); d.setDate(s.getDate() + i);
    const isToday = d.getTime() === today.getTime();
    const tag = dayLabel(d);
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' is-today' : '');
    cell.innerHTML =
      '<span class="day-name">' + CN_DAYS[d.getDay()] + '</span>' +
      '<span class="day-num">' + d.getDate() + '</span>' +
      '<span class="day-tag">' + (tag || '') + '</span>';
    strip.appendChild(cell);
  }
}

function renderSchedule() {
  const s = getMonStart(wkOffset);
  const options = getScheduleOptions();
  const body = document.getElementById('schedule-body');

  let html = '<div class="sched-table">';

  // AM row
  html += '<div class="sched-table-row">';
  html += '<div class="sched-table-label">☀️<br>10–16</div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(s); d.setDate(s.getDate() + i);
    const key = getSchedKey(fmt(d), 'am');
    const val = data.schedule[key] || '';
    const isToday = d.getTime() === today.getTime();
    html += '<div class="sched-cell' + (isToday ? ' is-today' : '') + '">';
    if (editMode) {
      html += buildSelect(key, val, options);
    } else {
      html += val || '<span class="empty-slot">—</span>';
    }
    html += '</div>';
  }
  html += '</div>';

  // PM row
  html += '<div class="sched-table-row">';
  html += '<div class="sched-table-label">🌙<br>16–22</div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(s); d.setDate(s.getDate() + i);
    const key = getSchedKey(fmt(d), 'pm');
    const val = data.schedule[key] || '';
    const isToday = d.getTime() === today.getTime();
    html += '<div class="sched-cell' + (isToday ? ' is-today' : '') + '">';
    if (editMode) {
      html += buildSelect(key, val, options);
    } else {
      html += val || '<span class="empty-slot">—</span>';
    }
    html += '</div>';
  }
  html += '</div></div>';

  body.innerHTML = html;
}

function buildSelect(key, val, options) {
  let opts = '<option value="">—</option>';
  options.forEach(n => { opts += `<option value="${n}" ${n===val?'selected':''}>${n}</option>`; });
  if (val && !options.includes(val)) opts += `<option value="${val}" selected>${val}</option>`;
  return `<select class="schedule-select" onchange="setSchedule('${key}', this.value)">${opts}</select>`;
}

function setSchedule(key, value) {
  if (value) { data.schedule[key] = value; } else { delete data.schedule[key]; }
  saveData();
}

function escV2(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function daysFromToday(dateStr) {
  if (!dateStr || dateStr.indexOf('?') !== -1) return null;
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((d.getTime() - now.getTime()) / 86400000);
}

function getItem(path, idx) {
  const parts = path.split('.');
  let obj = data;
  for (const p of parts) obj = obj[p];
  return idx !== null && idx !== undefined ? obj[idx] : obj;
}

function openDetail(path, idx) {
  const item = getItem(path, idx);
  if (!item) { console.warn('[openDetail] item not found at', path, idx); return; }
  const modal = document.getElementById('detail-modal');
  const content = document.getElementById('detail-content');
  const isVolunteer = path.includes('volunteers');
  const isRep = (path === 'reps' || path === 'ownershipReps');
  // v1.1 Phase B: 非 role-shape 的新条目（活动 / 共建组 / 离任）走只读 view
  const isV2NonRole = path.startsWith('activityRoadmap') || path === 'groups' || path === 'departures';

  if (isV2NonRole) {
    // 只读卡片视图（Phase C 再加编辑）
    let bodyHtml = '';
    if (path.startsWith('activityRoadmap')) {
      bodyHtml = `
        <div class="modal-title" style="margin-bottom:4px;">${escV2(item.title || '')}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:14px;">${escV2(item.status || '')} · ${escV2(item.duration || '')}</div>
        ${item.leader     ? `<div class="form-group"><label class="form-label">负责人</label><div>${escV2(item.leader)}</div></div>` : ''}
        ${item.startDate  ? `<div class="form-group"><label class="form-label">开始时间</label><div>${escV2(item.startDate)}</div></div>` : ''}
        ${item.targetGroup? `<div class="form-group"><label class="form-label">触发 / 关联组</label><div>${escV2(item.targetGroup)}</div></div>` : ''}
      `;
    } else if (path === 'groups') {
      bodyHtml = `
        <div class="modal-title" style="margin-bottom:4px;">${escV2(item.emoji || '')} ${escV2(item.name || '')}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:14px;">${item.status === 'active' ? '激活' : '待启动'} · ${escV2(item.desc || '')}</div>
        ${item.leader && item.leader.name ? `<div class="form-group"><label class="form-label">组长</label><div>${escV2(item.leader.name)}</div></div>` : ''}
        ${item.activatedBy ? `<div class="form-group"><label class="form-label">激发活动 key</label><div>${escV2(item.activatedBy)}</div></div>` : ''}

      bodyHtml = `
        <div class="modal-title" style="margin-bottom:4px;">${escV2(item.name || '')}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:14px;">${escV2(item.role || '')}</div>

      `;
    }
    content.innerHTML = `

    `;

  }

  const emoji = item.emoji || (isRep ? '🏷️' : '👤');

  if (editMode) {

        <div class="form-group"><label class="form-label">姓名</label><input class="form-input" id="df-name" value="${item.name || ''}"></div>
        <div class="form-group"><label class="form-label">职责方向</label><input class="form-input" id="df-title" value="${item.title || ''}"></div>
        <div class="form-group"><label class="form-label">关键词（逗号分隔）</label><input class="form-input" id="df-keywords" value="${(item.keywords||[]).join('、')}"></div>
        <div class="form-group"><label class="form-label">描述</label><textarea class="form-input" id="df-desc">${item.desc || ''}</textarea></div>
      `;
    } else {
      fields = `
        <div class="form-group"><label class="form-label">角色名称</label><input class="form-input" id="df-role" value="${item.role || ''}"></div>
        <div class="form-group"><label class="form-label">姓名</label><input class="form-input" id="df-name" value="${item.name || ''}"></div>
        <div class="form-group"><label class="form-label">描述</label><textarea class="form-input" id="df-desc">${item.desc || ''}</textarea></div>
      `;
    }

    // Common detail fields (not for reps)
    if (!isRep) {
      // ── B 战役：关联成员区块（在详细资料之前）──
      const linkRecId = item.member_rec_id || '';
      const linkedMember = linkRecId && _membersById && _membersById[linkRecId] ? _membersById[linkRecId] : null;
      const isStaleLink = linkRecId && !linkedMember && _membersById !== null; // 已拉过但找不到 = 成员被删
      const isLoadingMembers = _membersById === null && linkRecId;

      let linkBlock = '<div class="link-section"><div class="link-section-title">🔗 关联社区成员</div>';
      if (linkedMember) {
        linkBlock += renderLinkedMemberCard(linkedMember);
        linkBlock += '<div class="link-actions">'
          + '<button class="btn btn-sm btn-outline" style="flex:1" onclick="openPicker(\'' + path + '\',' + idx + ')">更换成员</button>'
          + '<button class="btn btn-sm btn-outline" style="flex:1" onclick="clearMemberLink(\'' + path + '\',' + idx + ')">解除关联</button>'
        + '</div>';
      } else if (isStaleLink) {
        linkBlock += '<div class="link-fallback-hint" style="color:var(--danger)">⚠️ 已关联的成员（rec_id: ' + escTeamHtml(linkRecId) + '）在成员池中已不存在，建议重新选择或解除。</div>'
          + '<div class="link-actions" style="margin-top:8px">'
          + '<button class="btn btn-sm btn-outline" style="flex:1" onclick="openPicker(\'' + path + '\',' + idx + ')">重新选择</button>'
          + '<button class="btn btn-sm btn-outline" style="flex:1" onclick="clearMemberLink(\'' + path + '\',' + idx + ')">解除关联</button>'
        + '</div>';
      } else if (isLoadingMembers) {
        linkBlock += '<div class="link-fallback-hint">⏳ 成员池加载中…</div>';
      } else {
        linkBlock += '<button class="btn-link-pick" onclick="openPicker(\'' + path + '\',' + idx + ')">🔗 选择社区成员</button>'
          + '<div class="link-fallback-hint">关联后，详情卡会自动显示成员的真实简介与头像。<br>未关联则使用下方手动填写的姓名、简介、头像。</div>';
      }
      linkBlock += '</div>';
      fields += linkBlock;

      // 是否已关联：决定下方「手动填写」区块是激活态还是灰显（已关联时这些字段
      // 不会展示在详情页，但保留以便解除关联时立刻有 fallback，且不丢失历史数据）
      const hasLink = !!(linkRecId && (linkedMember || isStaleLink || isLoadingMembers));
      fields += `
        <div class="manual-section ${hasLink ? 'is-dimmed' : ''}">
          <p class="section-title" style="margin-bottom: 12px;">
            手动填写${hasLink ? '<span class="manual-hint">（已关联成员，下方字段不会展示在详情页 — 解除关联后才生效）</span>' : '（未关联成员时使用）'}
          </p>
          <div class="form-group"><label class="form-label">头像 URL</label><input class="form-input" id="df-avatar" value="${item.avatar || ''}"></div>
          <div class="form-group"><label class="form-label">岗位职责 (JD)</label><textarea class="form-input" id="df-jd">${item.jd || ''}</textarea></div>
          <div class="form-group"><label class="form-label">个人简介</label><textarea class="form-input" id="df-bio">${item.bio || ''}</textarea></div>
          <div class="form-group"><label class="form-label">任职时间</label><input class="form-input" id="df-since" value="${item.since || ''}" placeholder="如：2025年3月"></div>
        </div>
      `;
    }

    content.innerHTML = `
      <div class="modal-title">编辑</div>
      ${fields}
      <div class="modal-actions">
        <button class="btn btn-sm btn-outline" onclick="closeDetail()">取消</button>
        <button class="btn btn-sm btn-primary" onclick="saveDetail('${path}', ${idx})">保存</button>
      </div>
      ${isRep ? `<div style="margin-top: 10px;"><button class="btn btn-sm btn-danger" style="width:100%;" onclick="deleteRep(${idx})">删除</button></div>` : ''}
    `;
  } else {
    // ── VIEW mode ──
    // 设计：关联成员后，整张卡片展开成员的完整档案（avatar/bio/职业/兴趣等），
    //       角色信息退化为顶部的一个 chip + 一句 desc；不再叠加角色侧手填的
    //       jd/bio/since（避免重复维护、数据冲突）。
    //       未关联或 rep / stale 的情况走简单卡（沿用历史格式）。

    const linkedRecId = item.member_rec_id || '';
    const fullMember  = linkedRecId ? _membersFullById[linkedRecId] : null;
    const liteMember  = linkedRecId && _membersById ? _membersById[linkedRecId] : null;
    const linkedMember = fullMember || liteMember;
    const isStaleLink  = linkedRecId && !linkedMember && _membersById !== null;

    const role = item.role || item.title || '';
    const desc = item.desc || '';
    const jd = item.jd || '';
    const since = item.since || '';

    // 「社区层负责人」专属按钮（依 role 判定，换人不用改代码）
    const isCommunityLead = (item.role === '社区层');

    // 「悠洋」简历按钮：用关联成员名 → 否则 item.name（兼容关联前后）
    const personName = linkedMember ? (linkedMember.name || linkedMember.nickname || '') : (item.name || '');

    const cvBtn = (personName === '悠洋')
      ? `<a href="https://cyc.center/youyang" target="_blank" rel="noopener" class="action-link-green">📄 查看简历与作品集 ↗</a>`
      : '';
    const pwdBtn = isCommunityLead
      ? `<button onclick="openChangePwdModal()" class="action-btn-orange">🔑 修改活动通告密码</button>`
      : '';
    const communityAdminBtn = isCommunityLead
      ? `<a href="/community/admin" target="_blank" rel="noopener" class="action-link-green">👥 管理社区成员名单 ↗</a>`
      : '';

    if (isRep) {
      // ── 社区代表（无 member 关联）：保持原简单卡 ──
      let detailFields = '';
      if (item.type) detailFields += `<div class="detail-field"><div class="detail-label">代表类型</div><div class="detail-value">${escTeamHtml(item.type)}</div></div>`;
      if (desc) detailFields += `<div class="detail-field"><div class="detail-label">说明</div><div class="detail-value">${escTeamHtml(desc)}</div></div>`;
      content.innerHTML = `
        <div style="text-align:center;padding-top:8px;">
          <div class="detail-avatar" style="margin:0 auto 12px;">${emoji}</div>
          <div class="detail-role-badge">${escTeamHtml(role)}</div>
          <div class="detail-name">${escTeamHtml(item.name || '空缺')}</div>
        </div>
        <div style="margin-top:20px;">
          ${detailFields || '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px 0;">暂无详细信息</div>'}
        </div>
        <div class="modal-actions-stack">
          <button class="btn btn-sm btn-outline" style="width:100%;" onclick="closeDetail()">关闭</button>
        </div>`;
    } else if (linkedMember) {
      // ── 已关联成员：展开成员档案卡 ──
      const avatarHtml = linkedMember.avatar_token
        ? `<img src="/api/poster?token=${encodeURIComponent(linkedMember.avatar_token)}" onerror="this.style.display='none';this.parentNode.textContent='${emoji}'" alt="">`
        : emoji;

      const fullName = linkedMember.name || linkedMember.nickname || '（未填姓名）';
      const subName = (linkedMember.nickname && linkedMember.nickname !== linkedMember.name)
        ? `“${linkedMember.nickname}”` : '';

      const chipsHtml = [
        ...(linkedMember.cities || []).map(c => `<span class="member-chip chip-city">📍 ${escTeamHtml(c)}</span>`),
        ...(linkedMember.identity || []).map(i => `<span class="member-chip chip-identity">${escTeamHtml(i)}</span>`),
      ].join('');

      // 内容字段：先 desc（来自岗位），再成员的 bio + 丰富字段（仅 fullMember 有）
      let body = '';
      if (desc) body += `<div class="member-role-desc">📋 ${escTeamHtml(desc)}</div>`;

      if (fullMember) {
        if (fullMember.bio) {
          body += `<div class="member-bio">${escTeamHtml(fullMember.bio).replace(/\n/g,'<br>')}</div>`;
        }
        const jobLine = [fullMember.job, fullMember.company].filter(Boolean).join(' · ');
        const rows = [];
        if (jobLine)            rows.push(['💼', '职业', jobLine]);
        if (fullMember.topics)    rows.push(['🎯', '关注话题', fullMember.topics]);
        if (fullMember.willShare) rows.push(['🎤', '想做的分享', fullMember.willShare]);
        if (fullMember.interests) rows.push(['❤️', '感兴趣的活动', fullMember.interests]);
        if (fullMember.mbti)      rows.push(['🧠', 'MBTI', fullMember.mbti]);
        if (rows.length) {
          body += '<div class="member-rows">'
            + rows.map(([icon, label, val]) =>
                `<div class="member-row">
                   <span class="member-row-icon">${icon}</span>
                   <div class="member-row-body">
                     <div class="member-row-label">${escTeamHtml(label)}</div>
                     <div class="member-row-val">${escTeamHtml(val).replace(/\n/g,'<br>')}</div>
                   </div>
                 </div>`).join('')
            + '</div>';
        }

        // 活动参与记录 — 默认展示前 8 条，多余的渲染但隐藏，
        // 由"展开剩余 N 条 ▾"按钮就地切换（不跳转，避免和底下"查看完整成员主页"重复）
        const acts = fullMember.activities || [];
        if (acts.length) {
          const VISIBLE = 8;
          const more = Math.max(0, acts.length - VISIBLE);
          body += '<div class="member-activities-section">';
          body += `<div class="member-section-label">📅 活动参与（共 ${acts.length} 条）</div>`;
          body += '<div class="member-activities-list">';
          acts.forEach((act, i) => {
            const dateStr = fmtActDate(act.date);
            const rolesStr = (act.roles || []).join(' / ');
            const extraCls = i >= VISIBLE ? ' is-extra' : '';
            body += '<a class="member-activity-item' + extraCls + '" href="/events/' + encodeURIComponent(act.id) + '" target="_blank" rel="noopener">'
              +   '<div class="member-activity-title">' + escTeamHtml(act.title || '（未命名活动）') + '</div>'
              +   '<div class="member-activity-meta">'
              +     (dateStr  ? '<span class="member-activity-date">' + dateStr + '</span>' : '')
              +     (rolesStr ? '<span class="member-activity-role">' + escTeamHtml(rolesStr) + '</span>' : '')
              +     (act.loc  ? '<span class="member-activity-loc">📍 ' + escTeamHtml(act.loc) + '</span>' : '')
              +   '</div>'
              + '</a>';
          });
          body += '</div>';
          if (more > 0) {
            body += '<button type="button" class="member-activities-toggle"'
              +   ' data-more="' + more + '"'
              +   ' onclick="toggleMemberActsExpand(this)">'
              +   '展开剩余 ' + more + ' 条 ▾'
              + '</button>';
          }
          body += '</div>';
        }
      } else {
        // 还在拉完整档案：先用 lite 版的 80 字截断 bio 占位
        if (liteMember && liteMember.bio) {
          body += `<div class="member-bio">${escTeamHtml(liteMember.bio)}</div>`;
        }
        body += `<div class="member-loading-hint">⏳ 加载完整档案中…</div>`;
      }

      content.innerHTML = `
        <div class="member-detail-header">
          <div class="detail-avatar member-detail-avatar">${avatarHtml}</div>
          <div class="detail-role-badge">${escTeamHtml(role)}</div>
          <div class="detail-name">${escTeamHtml(fullName)}</div>
          ${subName ? `<div class="member-sub-name">${escTeamHtml(subName)}</div>` : ''}
          ${chipsHtml ? `<div class="member-chip-row">${chipsHtml}</div>` : ''}
        </div>
        <div class="member-detail-body">
          ${body || '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px 0;">该成员暂未填写个人信息</div>'}
        </div>
        <div class="modal-actions-stack">
          <a class="action-link-green" href="/community/${encodeURIComponent(linkedRecId)}" target="_blank" rel="noopener">查看完整成员主页 →</a>
          ${cvBtn}
          ${communityAdminBtn}
          ${pwdBtn}
          <button class="btn btn-sm btn-outline" style="width:100%;" onclick="closeDetail()">关闭</button>
        </div>`;

      // 异步拉完整档案（如果还没拿到），拉到后再渲染一次
      if (!fullMember) {
        loadFullMember(linkedRecId).then(m => {
          if (m && document.getElementById('detail-modal').classList.contains('active')) {
            openDetail(path, idx);
          }
        });
      }
    } else {
      // ── 未关联（或 stale）：原简单卡，用手动填的 jd/bio/since/avatar ──
      const avatarContent = item.avatar
        ? `<img src="${item.avatar}" alt="">`
        : emoji;

      let detailFields = '';
      if (isStaleLink) {
        detailFields += `<div class="detail-field" style="color:var(--danger);font-size:12px">⚠️ 关联的成员（${escTeamHtml(linkedRecId)}）已不在成员池中。请进入编辑模式重新选择或解除关联。</div>`;
      }
      if (desc) detailFields += `<div class="detail-field"><div class="detail-label">职责描述</div><div class="detail-value">${escTeamHtml(desc)}</div></div>`;
      if (isVolunteer && item.keywords && item.keywords.length) {
        detailFields += `<div class="detail-field"><div class="detail-label">关键词</div><div class="detail-value">${item.keywords.map(k => `<span class="keyword-tag" style="font-size:12px;padding:3px 8px;">${escTeamHtml(k)}</span>`).join(' ')}</div></div>`;
      }
      if (jd) detailFields += `<div class="detail-field"><div class="detail-label">岗位职责</div><div class="detail-value">${escTeamHtml(jd).replace(/\n/g,'<br>')}</div></div>`;
      if (item.bio) detailFields += `<div class="detail-field"><div class="detail-label">个人简介</div><div class="detail-value">${escTeamHtml(item.bio).replace(/\n/g,'<br>')}</div></div>`;
      if (since) detailFields += `<div class="detail-field"><div class="detail-label">任职时间</div><div class="detail-value">${escTeamHtml(since)}</div></div>`;

      content.innerHTML = `
        <div style="text-align:center;padding-top:8px;">
          <div class="detail-avatar" style="margin:0 auto 12px;">${avatarContent}</div>
          <div class="detail-role-badge">${escTeamHtml(role)}</div>
          <div class="detail-name">${escTeamHtml(item.name || '空缺')}</div>
        </div>
        <div style="margin-top:20px;">
          ${detailFields || '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px 0;">暂无详细信息（关联社区成员后将自动展示档案）</div>'}
        </div>
        <div class="modal-actions-stack">
          ${cvBtn}
          ${communityAdminBtn}
          ${pwdBtn}
          <button class="btn btn-sm btn-outline" style="width:100%;" onclick="closeDetail()">关闭</button>
        </div>`;
    }
  }

  modal.classList.add('active');
}

function saveDetail(path, idx) {
  const item = getItem(path, idx);
  const isVolunteer = path.includes('volunteers');
  const isRep = path === 'reps';

  if (isRep) {
    item.type = document.getElementById('df-type').value.trim();
    item.name = document.getElementById('df-name').value.trim();
    item.desc = document.getElementById('df-desc').value.trim();
    if (!item.name) { alert('请填写姓名'); return; }
  } else if (isVolunteer) {
    item.emoji = document.getElementById('df-emoji').value.trim();
    item.name = document.getElementById('df-name').value.trim();
    item.title = document.getElementById('df-title').value.trim();
    const kwStr = document.getElementById('df-keywords').value.trim();
    item.keywords = kwStr ? kwStr.split(/[,，、]/).map(s => s.trim()).filter(Boolean) : [];
    item.desc = document.getElementById('df-desc').value.trim();
  } else {
    if (document.getElementById('df-role')) item.role = document.getElementById('df-role').value.trim();
    item.name = document.getElementById('df-name').value.trim();
    item.desc = document.getElementById('df-desc').value.trim();
  }

  if (!isRep) {
    item.avatar = document.getElementById('df-avatar').value.trim();
    item.jd = document.getElementById('df-jd').value.trim();
    item.bio = document.getElementById('df-bio').value.trim();
    item.since = document.getElementById('df-since').value.trim();
  }

  saveData(); render(); closeDetail();
}

function deleteRep(idx) {
  // v1.1: 使用 ownershipReps
  const list = data.ownershipReps || data.reps;
  if (!list) return;
  list.splice(idx, 1);
  saveData(); render(); closeDetail();
}

function openAddRep() {
  if (!editMode) return;
  if (!data.ownershipReps) data.ownershipReps = [];
  data.ownershipReps.push({ type: '', name: '新代表', desc: '' });
  saveData(); render();
  openDetail('ownershipReps', data.ownershipReps.length - 1);
}

function closeDetail() { document.getElementById('detail-modal').classList.remove('active'); }

document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

// ═══════════════════════════════════════════
// 修改活动通告密码（悠洋专用）
// ═══════════════════════════════════════════
function openChangePwdModal() {
  closeDetail();
  ['cp-current','cp-new','cp-confirm'].forEach(id => document.getElementById(id).value = '');
  const err = document.getElementById('cp-error');
  err.textContent = '';
  err.classList.remove('cp-status-ok','cp-status-err');
  document.getElementById('cp-submit').textContent = '确认修改';
  document.getElementById('cp-submit').disabled = false;
  setTimeout(() => {
    document.getElementById('change-pwd-modal').classList.add('active');
    setTimeout(() => document.getElementById('cp-current').focus(), 250);
  }, 200);
}

function closeChangePwdModal() {
  document.getElementById('change-pwd-modal').classList.remove('active');
}

document.getElementById('change-pwd-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeChangePwdModal();
});

['cp-current','cp-new','cp-confirm'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') submitChangePassword();
  });
});

async function submitChangePassword() {
  const current = document.getElementById('cp-current').value.trim();
  const newPwd  = document.getElementById('cp-new').value.trim();
  const confirm = document.getElementById('cp-confirm').value.trim();
  const errEl   = document.getElementById('cp-error');
  const btn     = document.getElementById('cp-submit');

  errEl.classList.remove('cp-status-ok','cp-status-err');

  if (!current || !newPwd || !confirm) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '请填写完整三个密码';
    return;
  }
  if (newPwd !== confirm) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '两次输入的新密码不一致';
    return;
  }
  if (newPwd.length < 2) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '新密码至少 2 个字符';
    return;
  }
  if (newPwd === current) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '新密码不能与当前密码相同';
    return;
  }

  btn.textContent = '修改中...';
  btn.disabled    = true;
  errEl.textContent = '';

  try {
    const res = await fetch('/api/team-auth?action=change-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ currentPassword: current, newPassword: newPwd }),
    });
    const data = await res.json();

    if (res.ok && data.success) {
      // 清掉本会话缓存的同步密码（让用户下次同步时重新输入）
      try { sessionStorage.removeItem('cyc_sync_pwd'); } catch {}
      errEl.classList.add('cp-status-ok');
      errEl.textContent = '✓ 修改成功！请通知团队使用新密码';
      btn.textContent = '已成功';
      setTimeout(closeChangePwdModal, 1800);
      setTimeout(() => {
        btn.textContent = '确认修改';
        btn.disabled = false;
      }, 2200);
    } else {
      errEl.classList.add('cp-status-err');
      errEl.textContent = data.error || '修改失败';
      btn.textContent = '确认修改';
      btn.disabled    = false;
    }
  } catch (err) {
    errEl.classList.add('cp-status-err');
    errEl.textContent = '网络错误：' + err.message;
    btn.textContent = '确认修改';
    btn.disabled    = false;
  }
}

// ═══════════════════════════════════════════
// 🔗 B 战役：成员选择器 picker
// ═══════════════════════════════════════════
//   _pickerCtx = { path, idx } — 记住要把选中结果写回哪条角色
//   _pickerFilter — 当前搜索关键字，每次输入触发重渲染
let _pickerCtx    = null;
let _pickerFilter = '';

/** 入口：打开 picker；context 是当前编辑的角色路径（如 'cyc.triangle'）+ index */
function openPicker(path, idx) {
  _pickerCtx = { path, idx };
  _pickerFilter = '';
  document.getElementById('picker-search').value = '';
  document.getElementById('picker-modal').classList.add('active');
  setTimeout(() => document.getElementById('picker-search').focus(), 250);
  renderPicker();
  // 没拉过则现拉
  if (_membersById === null) {
    loadMembers().then(() => renderPicker());
  }
}

function closePicker() {
  document.getElementById('picker-modal').classList.remove('active');
  _pickerCtx = null;
}

document.getElementById('picker-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePicker();
});

document.getElementById('picker-search').addEventListener('input', e => {
  _pickerFilter = (e.target.value || '').trim().toLowerCase();
  renderPicker();
});

function renderPicker() {
  const listEl = document.getElementById('picker-list');

  // 加载状态
  if (_membersById === null) {
    listEl.innerHTML = '<div class="picker-loading">⏳ 加载成员池…</div>';
    return;
  }

  // 错误状态
  if (_membersErr) {
    listEl.innerHTML = '<div class="picker-error">😕 ' + escTeamHtml(_membersErr) + '<br><br>'
      + '<button class="btn btn-sm btn-outline" onclick="loadMembers(true).then(()=>renderPicker())">重试</button></div>';
    return;
  }

  if (!_membersList.length) {
    listEl.innerHTML = '<div class="picker-empty">🌿 成员池为空</div>';
    return;
  }

  const currentItem = _pickerCtx ? getItem(_pickerCtx.path, _pickerCtx.idx) : null;
  const currentRid  = currentItem?.member_rec_id || '';

  // 过滤
  const f = _pickerFilter;
  const filtered = !f ? _membersList : _membersList.filter(m => {
    const hay = ((m.name || '') + ' ' + (m.nickname || '') + ' ' + (m.cities || []).join(' ')).toLowerCase();
    return hay.includes(f);
  });

  let html = '';
  // 「无人担任 / 解除关联」选项放最上
  if (currentRid) {
    html += '<div class="picker-row is-clear" onclick="pickerSelect(\'\')">'
      + '<div class="picker-avatar">∅</div>'
      + '<div class="picker-row-info">'
        + '<div class="picker-row-name">解除关联（角色变为空缺）</div>'
        + '<div class="picker-row-meta">不与任何成员绑定</div>'
      + '</div>'
    + '</div>';
  }

  if (!filtered.length) {
    html += '<div class="picker-empty">没有匹配的成员</div>';
  } else {
    for (const m of filtered) {
      const isCurrent = m.record_id === currentRid;
      const displayName = m.name || m.nickname || '（未填姓名）';
      const meta = [
        m.nickname && m.nickname !== m.name ? '“' + m.nickname + '”' : '',
        (m.cities || []).join(' / '),
        (m.bio || '').slice(0, 30) + ((m.bio || '').length > 30 ? '…' : ''),
      ].filter(Boolean).join(' · ');
      const avatarHtml = m.avatar_token
        ? '<img src="/api/poster?token=' + encodeURIComponent(m.avatar_token) + '" onerror="this.style.display=\'none\';this.parentNode.textContent=\'👤\'">'
        : '👤';
      html += '<div class="picker-row' + (isCurrent ? ' is-current' : '') + '" onclick="pickerSelect(\'' + m.record_id + '\')">'
        + '<div class="picker-avatar">' + avatarHtml + '</div>'
        + '<div class="picker-row-info">'
          + '<div class="picker-row-name">' + escTeamHtml(displayName) + (isCurrent ? ' <span style="color:var(--orange);font-size:11px">· 当前</span>' : '') + '</div>'
          + (meta ? '<div class="picker-row-meta">' + escTeamHtml(meta) + '</div>' : '')
        + '</div>'
      + '</div>';
    }
  }
  listEl.innerHTML = html;
}

/** 选中某个成员（或传空字符串清除关联）→ 写回 data + 重新渲染详情 */
function pickerSelect(recId) {
  if (!_pickerCtx) return;
  // ⚠️ 必须先把 ctx 拷到本地变量再 closePicker —— closePicker 会把 _pickerCtx 置 null，
  //   不拷的话下面 openDetail 拿不到 path/idx，整个刷新链就断了（之前的 bug）
  const ctx = _pickerCtx;
  const item = getItem(ctx.path, ctx.idx);
  if (!item) return;
  item.member_rec_id = recId || '';
  // 关联成员后，把成员的 name 同步到 item.name（保险，反正 view 会优先读 member.name）
  if (recId && _membersById && _membersById[recId]) {
    const m = _membersById[recId];
    item.name = m.name || m.nickname || item.name || '';
  }
  saveData();
  closePicker();
  render();                          // 顺手刷新底层卡片，立刻能看到名字变化
  openDetail(ctx.path, ctx.idx);     // 重新渲染编辑卡，关联区块切到「已关联」状态
}

/** 简单 HTML escape，避免成员姓名 / bio 含 < > & 等字符破坏渲染 */
function escTeamHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/** 编辑卡里的「已关联成员」小卡（不带按钮，按钮在外面） */
function renderLinkedMemberCard(m) {
  const avatarHtml = m.avatar_token
    ? '<img src="/api/poster?token=' + encodeURIComponent(m.avatar_token) + '" onerror="this.style.display=\'none\';this.parentNode.textContent=\'👤\'">'
    : '👤';
  const meta = [
    (m.cities || []).join(' / '),
    (m.bio || '').slice(0, 50) + ((m.bio || '').length > 50 ? '…' : ''),
  ].filter(Boolean).join(' · ');
  return '<div class="linked-member">'
    + '<div class="linked-member-avatar">' + avatarHtml + '</div>'
    + '<div class="linked-member-info">'
      + '<div class="linked-member-name">' + escTeamHtml(m.name || m.nickname || '') + '</div>'
      + (meta ? '<div class="linked-member-meta">' + escTeamHtml(meta) + '</div>' : '')
    + '</div>'
  + '</div>';
}

/** 直接解除关联（不弹 picker） */
function clearMemberLink(path, idx) {
  const item = getItem(path, idx);
  if (!item) return;
  item.member_rec_id = '';
  saveData();
  openDetail(path, idx);  // 刷新当前详情卡
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
checkSession();
</script>
