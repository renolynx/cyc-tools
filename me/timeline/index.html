<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的时间线 · CYC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="社区的回忆 — 来到 CYC 后发生的一切">

  <!-- Daybreak OS — Daybook layer fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ──────────────────────────────────────────────
     *  Daybook layer · /me/timeline
     *  严格按 daybreak-os v2 规范实现
     *  - canvas: near-white     - surface: white + halo
     *  - 单一 coral 强调（仅 temporal/active/verb 语义）
     *  - 间距 4/8/12/16/24/32/48/64
     *  - 半径 9999/24/16/50% 四档
     *  - 字重 400/600/700
     *  - 字号 12/14/16/20/28/40
     *  - 禁纯 #fff / #000 / 第二强调色 / 装饰用色
     * ────────────────────────────────────────────── */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Daybook canvas + surface */
      --db-canvas:        oklch(0.985 0 0);
      --db-surface:       oklch(1 0 0);
      --db-text-primary:  oklch(0.15 0 0);
      --db-text-secondary:oklch(0.55 0 0);
      --db-text-tertiary: oklch(0.75 0 0);
      --db-fill-empty:    oklch(0.94 0 0);

      /* The ONE accent — temporal/active/verb only */
      --db-accent:        oklch(0.62 0.22 30);
      --db-accent-soft:   oklch(0.62 0.22 30 / 0.12);

      /* Radii — only four */
      --r-pill:           9999px;
      --r-card:           24px;
      --r-inner:          16px;
      --r-dot:            50%;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont,
                   "PingFang SC", system-ui, sans-serif;
      background: var(--db-canvas);
      color: var(--db-text-primary);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      padding-bottom: 96px;   /* room for activity bar */
      overflow-x: hidden;
    }

    /* ─── Page container ─── */
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    /* ─── Header ─── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 48px;
    }

    .back-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--db-text-tertiary);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-decoration: none;
    }
    .back-link:hover { color: var(--db-text-secondary); }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--db-text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    /* ──────────────────────────────────────────────
     *  Pattern 4 · Identity Card
     * ────────────────────────────────────────────── */
    .identity-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .mood-frame {
      width: 96px;
      height: 96px;
      background: var(--db-surface);
      border-radius: var(--r-dot);
      padding: 16px;
      box-shadow:
        0 8px 24px -8px oklch(0 0 0 / 0.06),
        0 0 32px oklch(0 0 0 / 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mood-svg { width: 100%; height: 100%; display: block; }

    .identity-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--db-text-primary);
      letter-spacing: -0.01em;
    }

    .identity-metric {
      font-size: 13px;
      font-weight: 400;
      color: var(--db-text-secondary);
      letter-spacing: 0;
      text-align: center;
    }
    /* coral on temporal anchor only */
    .identity-metric .accent {
      color: var(--db-accent);
      font-weight: 600;
    }

    /* ──────────────────────────────────────────────
     *  Surface (halo shadow — Daybook signature)
     * ────────────────────────────────────────────── */
    .surface {
      background: var(--db-surface);
      border-radius: var(--r-card);
      padding: 32px 24px;
      margin-bottom: 32px;
      box-shadow:
        0 8px 24px -8px oklch(0 0 0 / 0.08),
        0 0 48px oklch(0 0 0 / 0.04);
    }

    .surface-eyebrow {
      font-size: 12px;
      font-weight: 700;
      color: var(--db-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .surface-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--db-text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 32px;
    }

    /* ──────────────────────────────────────────────
     *  Pattern 1 · Artifact — Polaroid
     *  - white frame, 8/8/32 padding (不等距是规范关键)
     *  - photo aspect 1:1
     *  - tilt ±8° max
     * ────────────────────────────────────────────── */
    .polaroid {
      width: 160px;
      background: var(--db-surface);
      padding: 8px 8px 32px;
      box-shadow:
        0 2px 4px oklch(0 0 0 / 0.08),
        0 12px 24px -8px oklch(0 0 0 / 0.12);
      transform: rotate(var(--tilt, 0deg));
    }
    .polaroid__photo {
      aspect-ratio: 1;
      background: var(--db-fill-empty);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      /* placeholder: 灰阶 emoji（真实数据接入时换成 <img>） */
      filter: grayscale(1) opacity(0.45);
    }
    .polaroid__cap {
      padding-top: 12px;
      text-align: center;
    }
    .polaroid__title {
      font-size: 14px;
      font-weight: 600;
      color: var(--db-text-primary);
      letter-spacing: -0.01em;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .polaroid__date {
      font-size: 12px;
      font-weight: 400;
      color: var(--db-text-secondary);
      margin-top: 4px;
      letter-spacing: 0;
    }

    /* ─── Stack mode — 精选回忆 ─── */
    .stack-wrap {
      position: relative;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stack {
      position: relative;
      width: 200px;
      height: 220px;
      cursor: pointer;
    }
    .stack .polaroid {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(var(--tilt, 0deg));
      transform-origin: center bottom;
      transition: transform 600ms cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: var(--z, 1);
    }
    .stack-wrap:hover .stack .polaroid {
      transform: translate(calc(-50% + var(--fanX, 0px)), -50%) rotate(var(--fanTilt, 0deg));
    }

    .stack-quote {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      pointer-events: none;
      background: var(--db-surface);
      border-radius: var(--r-pill);
      padding: 12px 24px;
      box-shadow:
        0 8px 24px -8px oklch(0 0 0 / 0.10),
        0 0 32px oklch(0 0 0 / 0.05);
      font-size: 14px;
      font-weight: 600;
      color: var(--db-text-primary);
      letter-spacing: 0;
      white-space: nowrap;
      transition: transform 600ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 300ms ease;
    }
    .stack-wrap:hover .stack-quote {
      transform: translate(-50%, calc(-50% - 160px));
      opacity: 0.4;
    }

    /* ─── Lineup mode — 按月队列 ─── */
    .month-section {
      margin-bottom: 48px;
      scroll-margin-top: 24px;
    }
    .month-section:last-child { margin-bottom: 0; }

    .month-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 8px;
      margin-bottom: 16px;
    }
    .month-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--db-text-primary);
      letter-spacing: -0.01em;
    }
    .month-metric {
      font-size: 12px;
      font-weight: 400;
      color: var(--db-text-tertiary);
      letter-spacing: 0;
    }

    .lineup-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 16px 8px 24px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .lineup-row::-webkit-scrollbar { display: none; }

    .lineup-row .polaroid {
      flex-shrink: 0;
      scroll-snap-align: start;
    }
    .lineup-row .polaroid:nth-child(odd)  { --tilt: -3deg; }
    .lineup-row .polaroid:nth-child(even) { --tilt:  3deg; }

    /* ──────────────────────────────────────────────
     *  Pattern 3 · Scrubber
     *  - sticky right edge, 36-40px wide
     *  - month markers Bold UPPERCASE tracked
     *  - active entry: coral pill
     * ────────────────────────────────────────────── */
    .scrubber {
      position: fixed;
      right: 16px;
      top: 96px;
      bottom: 96px;
      width: 36px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 0;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .scrubber::-webkit-scrollbar { display: none; }

    .scrubber__month {
      font-size: 11px;
      font-weight: 700;
      color: var(--db-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: center;
      margin-top: 12px;
      padding: 0 4px;
    }
    .scrubber__month:first-child { margin-top: 0; }

    .scrubber__entry {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: var(--db-text-secondary);
      text-decoration: none;
      text-align: center;
      padding: 4px;
      border-radius: var(--r-inner);
      transition: background 150ms, color 150ms, font-weight 150ms;
      letter-spacing: 0;
    }
    .scrubber__entry:hover {
      background: oklch(0.96 0 0);
    }
    .scrubber__entry[data-active] {
      background: var(--db-accent);
      color: oklch(0.985 0 0);
      font-weight: 600;
    }

    /* ──────────────────────────────────────────────
     *  Pattern 2 · Persistent Activity Bar
     *  - bottom anchored, full width minus 16px
     *  - near-white surface (NOT dark — that's Aurora)
     *  - single coral pulse dot (temporal/active 语义)
     *  - plain language subtitle
     * ────────────────────────────────────────────── */
    .activity-bar {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 40;
      max-width: 688px;     /* 720 - 32 */
      margin: 0 auto;
      background: oklch(0.97 0 0);
      border-radius: var(--r-card);
      padding: 16px 24px;
      box-shadow:
        0 -4px 16px -4px oklch(0 0 0 / 0.06),
        0 0 32px oklch(0 0 0 / 0.04);
    }
    .activity-bar__header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .activity-bar__dot {
      width: 8px;
      height: 8px;
      border-radius: var(--r-dot);
      background: var(--db-accent);
      animation: db-pulse 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes db-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    .activity-bar__label {
      font-size: 14px;
      font-weight: 600;
      color: var(--db-text-primary);
      letter-spacing: 0;
    }
    .activity-bar__sub {
      font-size: 13px;
      font-weight: 400;
      color: var(--db-text-secondary);
      letter-spacing: 0;
      line-height: 1.5;
    }

    /* ──────────────────────────────────────────────
     *  Responsive — small screens
     * ────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .page { padding: 24px 16px 32px; }
      .page-header { margin-bottom: 32px; }
      .identity-card { margin-bottom: 32px; gap: 12px; }
      .mood-frame { width: 80px; height: 80px; padding: 12px; }
      .surface { padding: 24px 16px; }
      .stack-wrap { height: 280px; }
      .stack { width: 180px; height: 200px; }
      .polaroid { width: 140px; }
      .scrubber { right: 8px; width: 32px; }
    }
    @media (max-width: 420px) {
      .scrubber { display: none; } /* 太挤 — 留给 sticky 顶部条之类，先隐藏 */
    }
  </style>
</head>
<body>

  <main class="page">

    <!-- ═══════════ Header ═══════════ -->
    <header class="page-header">
      <a href="/" class="back-link">cyc.center</a>
      <h1 class="page-title">我的时间线</h1>
    </header>

    <!-- ═══════════ Identity Card ═══════════ -->
    <section class="identity-card">
      <div class="mood-frame">
        <!-- Self-Mood Mascot · 默认 content 状态（pure black on white） -->
        <svg class="mood-svg" viewBox="0 0 64 64" aria-label="content">
          <circle cx="22" cy="26" r="2.5" fill="oklch(0.15 0 0)"/>
          <circle cx="42" cy="26" r="2.5" fill="oklch(0.15 0 0)"/>
          <path d="M 22 38 Q 32 46 42 38"
                stroke="oklch(0.15 0 0)" stroke-width="2.5"
                fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="identity-name">玖玖</div>
      <div class="identity-metric">
        在 CYC 度过了 <span class="accent">142</span> 天 · 出席 23 次
      </div>
    </section>

    <!-- ═══════════ Memory Hero — Stack ═══════════ -->
    <section class="surface" aria-label="精选回忆">
      <div class="surface-eyebrow">今年最难忘的</div>
      <h2 class="surface-title">社区的回忆</h2>
      <div class="stack-wrap">
        <div class="stack" id="stack"><!-- JS --></div>
        <div class="stack-quote">来到社区后，发生了好多事</div>
      </div>
    </section>

    <!-- ═══════════ Timeline — Lineup ═══════════ -->
    <section class="surface" aria-label="完整时光">
      <div class="surface-eyebrow">逐月翻阅</div>
      <h2 class="surface-title">全部时光</h2>
      <div id="months"><!-- JS --></div>
    </section>

  </main>

  <!-- ═══════════ Right Scrubber ═══════════ -->
  <nav class="scrubber" id="scrubber" aria-label="时间轴导航"><!-- JS --></nav>

  <!-- ═══════════ Bottom Activity Bar ═══════════ -->
  <aside class="activity-bar" role="status" aria-live="polite">
    <div class="activity-bar__header">
      <span class="activity-bar__dot" aria-hidden="true"></span>
      <span class="activity-bar__label" id="ab-label">Recalling</span>
    </div>
    <p class="activity-bar__sub" id="ab-sub">
      Going through your year — give it a sec.
    </p>
  </aside>

  <script>
    /* ──────────────────────────────────────────────
     *  Mock 数据
     *  TODO 接真实数据：
     *    HERO_PICS  ← /api/member?id=<self> .activities 中精选 8 条
     *                 （按"代表性"评分：参与角色权重、活动 cover quality）
     *    MONTHS     ← 同接口，按 YYYY-MM 分组倒序
     *    days       ← max(0, today - first_rsvp_at)
     *    out_count  ← rsvps.length
     * ────────────────────────────────────────────── */
    const HERO_PICS = [
      { emoji: '🌊', title: '海边野餐',     date: '5月12日' },
      { emoji: '🥾', title: '苍山徒步',     date: '4月28日' },
      { emoji: '🎤', title: 'Open Mic',     date: '4月15日' },
      { emoji: '📖', title: '新书共读',     date: '4月3日'  },
      { emoji: '🎭', title: '即兴戏剧',     date: '3月22日' },
      { emoji: '🌅', title: '日出冥想',     date: '3月10日' },
      { emoji: '🎂', title: '生日派对',     date: '2月14日' },
      { emoji: '🎬', title: '深夜电影',     date: '1月28日' },
    ];

    const MONTHS = [
      { ym: '2025-05', label: '2025 · 5月', short: 'May', items: [
        { emoji: '🌊', title: '苍洱野餐',  day: 12 },
        { emoji: '🥾', title: '徒步',      day: 5  },
        { emoji: '🎨', title: '艺术沙龙',  day: 3  },
      ]},
      { ym: '2025-04', label: '2025 · 4月', short: 'Apr', items: [
        { emoji: '🎤', title: 'Open Mic',  day: 28 },
        { emoji: '📖', title: '新书共读',  day: 15 },
        { emoji: '🎭', title: '即兴戏剧',  day: 8  },
        { emoji: '🌊', title: '看海',      day: 3  },
      ]},
      { ym: '2025-03', label: '2025 · 3月', short: 'Mar', items: [
        { emoji: '🌅', title: '日出冥想',  day: 30 },
        { emoji: '🎵', title: '音乐分享',  day: 22 },
        { emoji: '☕', title: '咖啡品鉴',  day: 18 },
        { emoji: '🧘', title: '瑜伽',      day: 10 },
        { emoji: '🌸', title: '春日漫步',  day: 5  },
      ]},
      { ym: '2025-02', label: '2025 · 2月', short: 'Feb', items: [
        { emoji: '🎂', title: '生日派对',  day: 14 },
        { emoji: '💝', title: '情人节',    day: 14 },
        { emoji: '🎲', title: '桌游夜',    day: 7  },
      ]},
      { ym: '2025-01', label: '2025 · 1月', short: 'Jan', items: [
        { emoji: '🎬', title: '深夜电影',  day: 28 },
        { emoji: '🎉', title: '元旦派对',  day: 1  },
        { emoji: '🥟', title: '年夜饺子',  day: 23 },
      ]},
      { ym: '2024-12', label: '2024 · 12月', short: 'Dec', items: [
        { emoji: '🎄', title: '圣诞树',    day: 24 },
        { emoji: '🎁', title: '礼物交换',  day: 21 },
        { emoji: '⛄', title: '冬日散步',  day: 8  },
      ]},
      { ym: '2024-11', label: '2024 · 11月', short: 'Nov', items: [
        { emoji: '🍂', title: '秋叶',      day: 18 },
        { emoji: '🎃', title: '万圣节',    day: 1  },
      ]},
    ];

    /* ─── 工具：随机但可重现的 tilt（基于 index 哈希，避免每次 render 抖） ─── */
    function tiltFor(seed) {
      const s = (seed * 9301 + 49297) % 233280;
      // 范围 ±8°（规范：tilt range ±8°）
      return ((s / 233280) * 16 - 8).toFixed(2) + 'deg';
    }

    /* ─── Stack（精选 8 张） ─── */
    function renderStack() {
      const el = document.getElementById('stack');
      // fan-out 横向位置（hover 时散开，从 -200 到 +200 均匀分布）
      const fanX = [-220, -160, -100, -36, 36, 100, 160, 220];
      const fanTilts = [-8, -6, -4, -2, 2, 4, 6, 8];

      HERO_PICS.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'polaroid';
        card.style.setProperty('--tilt', tiltFor(i + 1));
        card.style.setProperty('--fanX', fanX[i] + 'px');
        card.style.setProperty('--fanTilt', fanTilts[i] + 'deg');
        card.style.setProperty('--z', i + 1);
        card.innerHTML = `
          <div class="polaroid__photo"><span>${p.emoji}</span></div>
          <div class="polaroid__cap">
            <div class="polaroid__title">${p.title}</div>
            <div class="polaroid__date">${p.date}</div>
          </div>`;
        el.appendChild(card);
      });
    }

    /* ─── Lineup（按月分组） ─── */
    function renderMonths() {
      const el = document.getElementById('months');
      MONTHS.forEach((m, mi) => {
        const sec = document.createElement('section');
        sec.className = 'month-section';
        sec.id = 'month-' + mi;
        const itemsHtml = m.items.map((it, i) => `
          <div class="polaroid">
            <div class="polaroid__photo"><span>${it.emoji}</span></div>
            <div class="polaroid__cap">
              <div class="polaroid__title">${it.title}</div>
              <div class="polaroid__date">${it.day} 日</div>
            </div>
          </div>`).join('');
        sec.innerHTML = `
          <div class="month-head">
            <div class="month-name">${m.label}</div>
            <div class="month-metric">${m.items.length} 场</div>
          </div>
          <div class="lineup-row">${itemsHtml}</div>`;
        el.appendChild(sec);
      });
    }

    /* ─── Scrubber（右侧时间尺） ─── */
    function renderScrubber() {
      const el = document.getElementById('scrubber');
      let html = '';
      MONTHS.forEach((m, mi) => {
        html += `<div class="scrubber__month">${m.short}</div>`;
        // 每月只列一个 entry — 月份本身（点击跳到该月 section）
        // 真实数据接入后可展开为每天日期
        html += `<a class="scrubber__entry" data-target="month-${mi}" href="#month-${mi}">${mi === 0 ? '·' : '·'}</a>`;
      });
      el.innerHTML = html;

      // 平滑滚动
      el.querySelectorAll('.scrubber__entry').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          const t = document.getElementById(a.dataset.target);
          if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      // 联动高亮
      const obs = new IntersectionObserver(entries => {
        entries.forEach(en => {
          if (en.isIntersecting) {
            el.querySelectorAll('.scrubber__entry').forEach(a => a.removeAttribute('data-active'));
            const a = el.querySelector(`[data-target="${en.target.id}"]`);
            if (a) a.setAttribute('data-active', '');
          }
        });
      }, { rootMargin: '-30% 0px -55% 0px' });
      document.querySelectorAll('.month-section').forEach(s => obs.observe(s));
    }

    /* ─── Activity Bar 文案轮播（朴素，不抒情） ─── */
    function loopActivity() {
      // 规范要求 plain language，reduces user anxiety
      const phrases = [
        ['Recalling',  'Going through your year — give it a sec.'],
        ['Sorting',    'Putting the moments in order.'],
        ['Selecting',  'Picking the ones that mattered most.'],
      ];
      const lab = document.getElementById('ab-label');
      const sub = document.getElementById('ab-sub');
      let i = 0;
      setInterval(() => {
        i = (i + 1) % phrases.length;
        lab.textContent = phrases[i][0];
        sub.textContent = phrases[i][1];
      }, 3600);
    }

    /* ─── 启动 ─── */
    renderStack();
    renderMonths();
    renderScrubber();
    loopActivity();
  </script>

</body>
</html>
