<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>CYC 工具站 · 链岛青年社区</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --bg: #f8fafc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 env(safe-area-inset-bottom);
    }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 640px;
      margin: 0 auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-badge {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tool-card:active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .tool-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .tool-icon.blue   { background: #eff6ff; }
    .tool-icon.green  { background: #f0fdf4; }
    .tool-icon.orange { background: #fff7ed; }
    .tool-icon.purple { background: #faf5ff; }

    .tool-info {
      flex: 1;
      min-width: 0;
    }

    .tool-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .tool-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tool-arrow {
      color: var(--border);
      font-size: 18px;
      flex-shrink: 0;
    }

    .coming-soon {
      opacity: 0.45;
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .badge-soon {
      background: #f1f5f9;
      color: #94a3b8;
    }

    footer {
      text-align: center;
      padding: 32px 16px;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-badge">CYC</div>
      <div class="logo-text">
        <h1>活动工具站</h1>
        <p>链岛青年社区 · 大理</p>
      </div>
    </div>
  </div>
</header>

<main>
  <p class="section-title">活动工具</p>

  <div class="tool-list">

    <a class="tool-card" href="/weekly-calendar/">
      <div class="tool-icon blue">📅</div>
      <div class="tool-info">
        <div class="tool-name">活动通告生成器</div>
        <div class="tool-desc">生成微信群用的每周活动公告</div>
      </div>
      <div class="tool-arrow">›</div>
    </a>

    <a class="tool-card" href="https://cyc.homes/activity" target="_blank" rel="noopener">
      <div class="tool-icon green">🗓️</div>
      <div class="tool-info">
        <div class="tool-name">社群活动日历</div>
        <div class="tool-desc">查看所有近期活动 · 飞书报名</div>
      </div>
      <div class="tool-arrow">›</div>
    </a>

    <a class="tool-card coming-soon" href="/event-card/">
      <div class="tool-icon orange">✨</div>
      <div class="tool-info">
        <div class="tool-name">
          活动信息提取
          <span class="badge badge-soon">即将上线</span>
        </div>
        <div class="tool-desc">AI 从文字中提取活动信息生成卡片</div>
      </div>
      <div class="tool-arrow">›</div>
    </a>

  </div>
</main>

<footer>
  CYC 链岛青年社区 · cyc.center
</footer>

</body>
</html>
