<body class="cyc-brand">

<header class="home-topbar">

  <nav class="home-topbar-nav">
    <a href="/community/memories">照片</a>
    <a href="/community">成员</a>

</header>

<main class="home">

  <!-- Hero 单海报：了解 CYC（点进去 /about 才有第二条 path /rooms 的入口）-->

    <a class="hero-poster hero-poster-a" href="/about" data-track="hero_path_a_click" data-track-meta='{"target":"about"}'>

    <header class="home-activities-head">
      <div class="home-activities-title">
        <span class="cyc-eyebrow cyc-eyebrow--sm" id="evEyebrow">EVENTS · 大理</span>
        <h3>近期活动</h3>

    </header>
    <div class="home-zone-tabs" role="tablist" aria-label="城市切换">
      <button class="home-zone-tab is-active" type="button" role="tab" data-zone="大理" data-track="home_zone_tab" data-track-meta='{"zone":"大理"}'>
        <span class="home-zone-tab-zh">大理</span>
        <span class="home-zone-tab-en">Dali</span>
      </button>
      <button class="home-zone-tab" type="button" role="tab" data-zone="上海" data-track="home_zone_tab" data-track-meta='{"zone":"上海"}'>
        <span class="home-zone-tab-zh">上海</span>

    <div id="actStream" class="home-act-grid">

</main>

<footer class="home-footer">

</footer>

<!-- 海报 lightbox（点击卡片海报触发）-->
<div class="poster-lightbox-overlay" id="posterLightbox" onclick="if(event.target.id==='posterLightbox')closePosterLightbox()">
  <button class="poster-lightbox-close" type="button" onclick="closePosterLightbox()" aria-label="关闭">×</button>
  <img class="poster-lightbox-img" id="plImg" src="" alt="">
  <div class="poster-lightbox-caption" id="plCaption"></div>
</div>

<!-- 人物 modal（点击活动卡片头像触发）-->
<div class="person-modal-overlay" id="personModal" onclick="if(event.target.id==='personModal')closePersonModal()">
  <div class="person-modal">
    <div class="person-modal-handle"></div>
    <button class="person-modal-close" type="button" onclick="closePersonModal()" aria-label="关闭">×</button>
    <div class="person-modal-body">
      <div class="person-modal-avatar-wrap" id="pmAvatar">
        <div class="person-modal-avatar-initials">?</div>
      </div>
      <div class="person-modal-info">
        <div class="person-modal-name" id="pmName"></div>
        <div class="person-modal-bio" id="pmBio"></div>
      </div>
    </div>
    <a class="person-modal-link" id="pmLink" href="#">查看完整 profile →</a>
  </div>
</div>

<script>
// ── 人物 modal ──
(function () {
  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  window.openPersonModal = function (btn) {
    var name  = btn.dataset.name  || '';
    var bio   = btn.dataset.bio   || '';
    var url   = btn.dataset.url   || '';   // KV blob URL（优先）
    var token = btn.dataset.token || '';   // 飞书 file_token（fallback）
    var mid   = btn.dataset.mid   || '';

    var overlay    = document.getElementById('personModal');
    var avatarWrap = document.getElementById('pmAvatar');
    var nameEl     = document.getElementById('pmName');
    var bioEl      = document.getElementById('pmBio');
    var linkEl     = document.getElementById('pmLink');

    var imgSrc = url || (token ? '/api/poster?token=' + encodeURIComponent(token) : '');
    if (imgSrc) {
      var img = new Image();
      img.alt = name;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
      img.onerror = function () {
        avatarWrap.innerHTML = '<div class="person-modal-avatar-initials">' + esc(name[0] || '?') + '</div>';
      };
      avatarWrap.innerHTML = '';
      avatarWrap.appendChild(img);
      img.src = imgSrc;
    } else {
      avatarWrap.innerHTML = '<div class="person-modal-avatar-initials">' + esc(name[0] || '?') + '</div>';
    }

    nameEl.textContent = name;
    if (bio) {
      bioEl.className   = 'person-modal-bio';
      bioEl.textContent = bio;
    } else {
      bioEl.className   = 'person-modal-no-bio';
      bioEl.textContent = '暂无简介';
    }

    if (mid) {
      linkEl.href         = '/community/' + mid;
      linkEl.style.display = '';
    } else {
      linkEl.style.display = 'none';
    }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    if (typeof cycTrack === 'function') {
      cycTrack('event_card_avatar_click', { name: name, member_rec_id: mid });
    }
  };

  window.closePersonModal = function () {
    var overlay = document.getElementById('personModal');
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';
  };

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') window.closePersonModal();
  });
})();

// ── 海报 lightbox（点击卡片海报 / 详情页海报触发）──
(function () {
  window.openPosterLightbox = function (e, token, title) {
    if (e) { e.stopPropagation(); e.preventDefault(); }
    if (!token) return;
    document.getElementById('plImg').src = '/api/poster?token=' + encodeURIComponent(token);
    document.getElementById('plImg').alt = title || '';
    document.getElementById('plCaption').textContent = title || '';
    document.getElementById('posterLightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
    if (typeof cycTrack === 'function') {
      cycTrack('event_card_poster_click', { token: token });
    }
  };
  window.closePosterLightbox = function () {
    var overlay = document.getElementById('posterLightbox');
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';
  };
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') window.closePosterLightbox();
  });
})();

// ── 活动卡片流：未来 4 周 + 最近 2 周历史（含 RSVP 头像数据）──
//   未来活动按时间升序在前（最近的在最前面），最近过去活动倒序补在后（已结束 desaturate）
//   总数限 12 张，避免首页过长
//
// 706 × muShanghai：城市分流
//   localStorage cyc-home-zone = '大理' | '上海'，默认 '大理'
//   tab 切换 → 重新拉对应 city，eyebrow 跟着切，"全部活动 →" 链接也跟着切
const ZONE_KEY = 'cyc-home-zone';
const ZONE_CONFIG = {
  '大理': {
    eyebrow: 'EVENTS · 大理',
    moreHref: '/events',
    moreLabel: '全部活动 →',
    emptyHtml: '<div class="home-act-empty">本月还没活动 · <a href="/generator">发一场？</a></div>',
    daysPast: 14,
    daysFuture: 28,
  },
  '上海': {
    eyebrow: 'EVENTS · 上海 · 706 × muShanghai',
    moreHref: '/shanghai',
    moreLabel: 'All Shanghai events →',
    emptyHtml: '<div class="home-act-empty">No upcoming Shanghai events · <a href="/shanghai">see /shanghai</a></div>',
    daysPast: 30,
    daysFuture: 35,  // 覆盖到 6/6 文化周收官
  },
};

function getCurrentZone() {
  try {
    const z = localStorage.getItem(ZONE_KEY);
    if (z === '大理' || z === '上海') return z;
  } catch {}
  return '大理';
}

function setCurrentZone(zone) {
  try { localStorage.setItem(ZONE_KEY, zone); } catch {}
}

async function loadActivities(zone) {
  const cfg = ZONE_CONFIG[zone] || ZONE_CONFIG['大理'];
  const stream = document.getElementById('actStream');
  stream.innerHTML = '<div class="home-act-loading">加载中…</div>';

  // 更新 eyebrow + "全部活动 →" 链接
  const eyebrow = document.getElementById('evEyebrow');
  const moreLink = document.getElementById('evMoreLink');
  if (eyebrow)  eyebrow.textContent = cfg.eyebrow;
  if (moreLink) {
    moreLink.href = cfg.moreHref;
    moreLink.textContent = cfg.moreLabel;
  }

  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const past = new Date(today.getTime() - cfg.daysPast * 86400000);
  const future = new Date(today.getTime() + cfg.daysFuture * 86400000);
  const start = past.toISOString().slice(0, 10);
  const end   = future.toISOString().slice(0, 10);

  let acts = [];
  try {
    const res = await fetch('/api/get-activities', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ weekStart: start, weekEnd: end, include_rsvps: true, city: zone }),
    });
    const data = await res.json();
    acts = (data.activities || []).filter(a => a.status !== '胎死腹中' && a.status !== '已归档');
  } catch (err) {
    stream.innerHTML = '<div class="home-act-empty">活动加载失败 · <a href="/events">看 /events</a></div>';
    return;
  }

  if (!acts.length) {
    stream.innerHTML = cfg.emptyHtml;
    return;
  }

  // 切两段：未来升序 + 过去倒序，未来在前
  const upcoming = acts.filter(a => (a.date || '') >= todayStr).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const recent   = acts.filter(a => (a.date || '') <  todayStr).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const ordered  = [...upcoming, ...recent].slice(0, 12);

  stream.innerHTML = ordered.map(renderCard).join('');
}

// 启动 + tab 切换
(function initZoneTabs() {
  const initialZone = getCurrentZone();
  // 同步 active 态
  document.querySelectorAll('.home-zone-tab').forEach(btn => {
    btn.classList.toggle('is-active', btn.dataset.zone === initialZone);
    btn.setAttribute('aria-selected', btn.dataset.zone === initialZone ? 'true' : 'false');
    btn.addEventListener('click', function () {
      const zone = this.dataset.zone;
      if (!zone || zone === getCurrentZone()) return;
      setCurrentZone(zone);
      document.querySelectorAll('.home-zone-tab').forEach(b => {
        const active = b.dataset.zone === zone;
        b.classList.toggle('is-active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      loadActivities(zone);
    });
  });
  loadActivities(initialZone);
})();

function renderCard(a) {
  const isPast = a.date && a.date < new Date().toISOString().slice(0, 10);
  const dateStr = formatDate(a.date);
  const thumbHtml = a.poster?.file_token
    ? `<img class="home-act-thumb" data-zoomable src="/api/poster?token=${encodeURIComponent(a.poster.file_token)}" alt="${escapeHtml(a.title || '海报')}" loading="lazy" onclick="openPosterLightbox(event, '${escapeAttr(a.poster.file_token)}', '${escapeAttr(a.title || '')}')">`
    : `<div class="home-act-thumb home-act-thumb-empty ${cycTimeClass(a.time)}" aria-hidden="true"></div>`;
  const avatarHtml = renderAvatarGroups(
    a.card_speakers || [],
    a.card_attendees || [],
    a.card_attendee_total || 0
  );
  const expandHtml = renderExpand(a, isPast);
  // ⚠️ 外层用 <article> 而非 <a>：避免与内层"📝 详情"<a>嵌套（HTML 不允许 <a> 套 <a>，
  // 浏览器解析器会自动 close 外层 → 卡片被劈成两半）。SEO + 分享靠展开区里的 <a>。
  return `<article class="home-act-card${isPast ? ' is-past' : ''}" data-track="event_card_click" data-track-meta='${escapeAttr(JSON.stringify({record_id: a.record_id}))}' data-href="/events/${escapeAttr(a.record_id)}" onclick="toggleCardExpand(event, this)">
    ${thumbHtml}
    <div class="home-act-body">
      <div class="home-act-meta">
        ${dateStr ? `<span class="home-act-pill home-act-pill-date">${dateStr}</span>` : ''}
        ${a.time ? `<span class="home-act-pill home-act-pill-time">⏰ ${escapeHtml(a.time)}</span>` : ''}
        ${isPast
          ? '<span class="home-act-pill home-act-pill-past">已结束</span>'
          : (a.is_public === false
              ? '<span class="home-act-pill home-act-pill-closed">🔒 仅成员</span>'
              : '<span class="home-act-pill home-act-pill-open">🌿 对外开放</span>')}
      </div>
      <h4 class="home-act-title">${escapeHtml(a.title || '未命名活动')}</h4>
      ${a.title_en && a.title_en !== a.title ? `<div class="home-act-title-en">${escapeHtml(a.title_en)}</div>` : ''}
      ${a.loc ? `<div class="home-act-loc">📍 ${escapeHtml(a.loc)}</div>` : ''}
      ${avatarHtml}
    </div>
    ${expandHtml}
  </article>`;
}

// 卡片展开区：描述 + 流程 + 费用 / 报名 + 类型 chips + 详情 CTA
function renderExpand(a, isPast) {
  const typesHtml = a.types?.length
    ? `<div class="home-act-expand-types">${a.types.slice(0, 6).map(t => `<span class="cm-type-chip">${escapeHtml(t)}</span>`).join('')}</div>`
    : '';
  const descHtml = a.desc
    ? `<p class="home-act-expand-desc">${escapeHtml(a.desc)}</p>`
    : '';
  const flowHtml = (a.flow && a.flow.length)
    ? `<div class="home-act-expand-flow"><div class="home-act-expand-h">🗓️ 流程</div><ul>${a.flow.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul></div>`
    : '';
  const metaParts = [];
  if (a.fee)    metaParts.push(`<div><strong>💰 费用</strong> ${escapeHtml(a.fee)}</div>`);
  if (a.signup) metaParts.push(`<div><strong>🙋 报名</strong> ${escapeHtml(a.signup)}</div>`);
  const metaHtml = metaParts.length ? `<div class="home-act-expand-meta">${metaParts.join('')}</div>` : '';
  const ctaLabel = isPast ? '查看完整页 →' : '📝 详情 / 报名 →';
  const ctaHtml = `<a class="home-act-expand-cta" href="/events/${escapeAttr(a.record_id)}" onclick="event.stopPropagation()">${ctaLabel}</a>`;
  return `<div class="home-act-expand"><div class="home-act-expand-inner">${typesHtml}${descHtml}${flowHtml}${metaHtml}${ctaHtml}</div></div>`;
}

// 卡片整体 click → toggle 展开（按钮/内嵌 link/修饰键不触发）
function toggleCardExpand(e, card) {
  // 内部 button / 内部 anchor → 让其各自 onclick 工作
  if (e.target.closest('button, a')) return;
  // Cmd/Ctrl/Shift click → 新 tab 打开详情页（外层不再是 <a>，用 JS 模拟）
  if (e.metaKey || e.ctrlKey || e.shiftKey) {
    const href = card.dataset.href;
    if (href) window.open(href, '_blank');
    return;
  }
  card.classList.toggle('is-expanded');
}
// 中键单独处理（mousedown，因为 click 事件不一定带 button=1）
document.addEventListener('mousedown', function (e) {
  if (e.button !== 1) return;
  const card = e.target.closest('.home-act-card');
  if (!card || e.target.closest('button, a')) return;
  e.preventDefault();
  const href = card.dataset.href;
  if (href) window.open(href, '_blank');
});

function renderAvatarGroups(speakers, attendees, total) {
  if (!speakers.length && !attendees.length) return '';

  function avatarBtn(p) {
    const initials = escapeHtml((p.name || '?')[0]);
    // 优先 KV blob URL；其次 飞书 file_token；都没有 → 首字母圆
    const imgSrc = p.avatar_url
      ? p.avatar_url
      : (p.avatar_token ? '/api/poster?token=' + encodeURIComponent(p.avatar_token) : '');
    const content = imgSrc
      ? `<img src="${escapeHtml(imgSrc)}" alt="${escapeHtml(p.name)}" loading="lazy">`
      : `<span class="card-avatar-initials">${initials}</span>`;
    return `<button class="card-avatar" type="button"` +
      ` data-name="${escapeHtml(p.name)}"` +
      ` data-bio="${escapeHtml(p.bio || '')}"` +
      ` data-url="${escapeHtml(p.avatar_url || '')}"` +
      ` data-token="${escapeHtml(p.avatar_token || '')}"` +
      ` data-mid="${escapeHtml(p.member_rec_id || '')}"` +
      ` onclick="event.preventDefault();event.stopPropagation();openPersonModal(this)"` +
      ` aria-label="${escapeHtml(p.name)}">${content}</button>`;
  }

  let html = '<div class="card-avatar-groups">';

  if (speakers.length) {
    html += '<div class="card-avatar-group card-avatar-group--speaker">';
    html += '<span class="card-avatar-group-label">嘉宾</span>';
    html += '<div class="card-avatar-stack">';
    html += speakers.map(p => avatarBtn(p)).join('');
    html += '</div></div>';
  }

  if (attendees.length) {
    const more = (total || attendees.length) - attendees.length;
    html += '<div class="card-avatar-group card-avatar-group--attendee">';
    html += '<span class="card-avatar-group-label">报名</span>';
    html += '<div class="card-avatar-stack">';
    html += attendees.map(p => avatarBtn(p)).join('');
    if (more > 0) html += `<span class="card-avatar-more">+${more}</span>`;
    html += '</div></div>';
  }

  html += '</div>';
  return html;
}

function formatDate(d) {
  if (!d) return '';
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${parseInt(m[2])}/${parseInt(m[3])}` : d;
}
function escapeHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

// dayrise v4.2.5 时段渐变占位（5 段 + 兼容全角冒号）
// 镜像 _activity.js cycTimeClass —— 服务端 / 客户端共享逻辑
function cycTimeClass(timeStr) {
  const m = String(timeStr || '').match(/^(\d{1,2})\s*[：:](\d{1,2})?/);
  if (!m) return 'cyc-time-noon';
  const h = parseInt(m[1], 10);
  const min = m[2] ? parseInt(m[2], 10) : 0;
  if (isNaN(h)) return 'cyc-time-noon';
  const t = h + (isNaN(min) ? 0 : min) / 60;
  if (t < 5)    return 'cyc-time-night';
  if (t < 11.5) return 'cyc-time-morning';
  if (t < 15)   return 'cyc-time-noon';
  if (t < 17)   return 'cyc-time-dusk';
  if (t < 20)   return 'cyc-time-evening';
  return 'cyc-time-night';
}
</script>
<script src="/cyc-track.js" defer></script>
