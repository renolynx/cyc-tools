<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>CYC 链岛青年社区 · Connected Youth Community Dali</title>
<meta name="description" content="CYC 链岛青年社区 · 大理在地创意人和数字游民的社区工具站。来这里发活动、找搭子、看本周谁在做什么。">
<meta name="keywords" content="CYC, 链岛青年社区, Connected Youth Community, Dali, 大理, digital nomad, coliving, 数字游民, Yunnan, 云南, community">
<meta property="og:type" content="website">
<meta property="og:title" content="CYC 链岛青年社区 · Dali">
<meta property="og:description" content="链接每一座孤岛 · 来大理的创意人都在这里">
<meta property="og:url" content="https://cyc.center/">
<meta property="og:image" content="https://cyc.center/api/og-default">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="zh_CN">
<meta property="og:locale:alternate" content="en_US">
<link rel="canonical" href="https://cyc.center/">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<header class="home-topbar">
  <a href="/" class="home-topbar-brand">CYC.center</a>
  <nav class="home-topbar-nav">
    <a href="/events">活动</a>
    <a href="/community">成员</a>
    <a href="/tools">工具</a>
  </nav>
</header>

<main class="home">

  <!-- Hero 双海报 -->
  <section class="home-hero">
    <a class="hero-poster hero-poster-a" href="/about" data-track="hero_path_a_click" data-track-meta='{"target":"about"}'>
      <div class="hero-poster-content">
        <h2>在大理</h2>
        <p class="hero-poster-tagline">有这样一群人在认真做事 —— 做独立项目、做创作、做社区</p>
        <span class="hero-poster-cta">了解 CYC →</span>
      </div>
    </a>
    <a class="hero-poster hero-poster-b" href="/rooms" data-track="hero_path_b_click" data-track-meta='{"target":"rooms"}'>
      <div class="hero-poster-content">
        <h2>想试一个月吗</h2>
        <p class="hero-poster-tagline">看看每一间房 · 价格 · 入住时间 · 试住政策</p>
        <span class="hero-poster-cta">看房型 →</span>
      </div>
    </a>
  </section>

  <!-- 创建活动 CTA（玖玖型用户的核心入口）-->
  <section class="home-cta-section">
    <a class="home-cta-create" href="/generator" data-track="cta_create_event">
      <span class="home-cta-icon">✏️</span>
      <span>创建活动通告</span>
      <span class="home-cta-arrow">→</span>
    </a>
    <p class="home-cta-hint">CYC 工具站 · 活动通告生成器 · 一键发到微信群</p>
  </section>

  <!-- 活动卡片流 -->
  <section class="home-activities">
    <header class="home-activities-head">
      <h3>近期活动</h3>
      <a href="/events">全部活动 →</a>
    </header>
    <div id="actStream" class="home-act-grid">
      <div class="home-act-loading">加载中…</div>
    </div>
  </section>

</main>

<footer class="home-footer">
  <p class="home-footer-tagline">链接每一座孤岛</p>
  <p>CYC 链岛青年社区 · Connected Youth Community in Dali</p>
</footer>

<script>
// ── 活动卡片流：拉未来 4 周活动 ──
(async function loadActivities() {
  const today = new Date();
  const start = today.toISOString().slice(0, 10);
  const future = new Date(today.getTime() + 28 * 86400000);
  const end = future.toISOString().slice(0, 10);

  let acts = [];
  try {
    const res = await fetch('/api/get-activities', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ weekStart: start, weekEnd: end }),
    });
    const data = await res.json();
    acts = (data.activities || []).filter(a => a.status !== '胎死腹中' && a.status !== '已归档');
    // 按日期升序
    acts.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  } catch (err) {
    document.getElementById('actStream').innerHTML =
      '<div class="home-act-empty">活动加载失败 · <a href="/events">看 /events</a></div>';
    return;
  }

  const stream = document.getElementById('actStream');
  if (!acts.length) {
    stream.innerHTML = '<div class="home-act-empty">本月还没活动 · <a href="/generator">发一场？</a></div>';
    return;
  }

  stream.innerHTML = acts.slice(0, 12).map(renderCard).join('');
})();

function renderCard(a) {
  const isPast = a.date && a.date < new Date().toISOString().slice(0, 10);
  const dateStr = formatDate(a.date);
  const thumbHtml = a.poster?.file_token
    ? `<img class="home-act-thumb" src="/api/poster?token=${encodeURIComponent(a.poster.file_token)}" alt="" loading="lazy">`
    : `<div class="home-act-thumb home-act-thumb-empty">📅</div>`;
  return `<a class="home-act-card" href="/events/${escapeAttr(a.record_id)}" data-track="event_card_click" data-track-meta='${escapeAttr(JSON.stringify({record_id: a.record_id}))}'>
    ${thumbHtml}
    <div class="home-act-body">
      <div class="home-act-meta">
        ${dateStr ? `<span class="home-act-pill home-act-pill-date">${dateStr}</span>` : ''}
        ${a.time ? `<span class="home-act-pill home-act-pill-time">⏰ ${escapeHtml(a.time)}</span>` : ''}
        ${isPast ? '<span class="home-act-pill home-act-pill-past">已结束</span>' : '<span class="home-act-pill home-act-pill-open">🌿 对外开放</span>'}
      </div>
      <h4 class="home-act-title">${escapeHtml(a.title || '未命名活动')}</h4>
      ${a.loc ? `<div class="home-act-loc">📍 ${escapeHtml(a.loc)}</div>` : ''}
    </div>
  </a>`;
}

function formatDate(d) {
  if (!d) return '';
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${parseInt(m[2])}/${parseInt(m[3])}` : d;
}
function escapeHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }
</script>
<script src="/cyc-track.js" defer></script>

</body>
</html>
