<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>埋点数据 · CYC 链岛青年社区</title>
<link rel="stylesheet" href="/styles.css">
<style>
/* /admin/instrumentation — quiet 版（沙底 + 三 blob，aurora-canvas 提供 2px 绿装饰线） */
.adm-wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 16px 64px; }

.adm-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
.adm-title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; color: var(--cyc-text-strong); }
.adm-back {
  font-size: 13px; color: var(--cyc-text-muted); text-decoration: none;
  padding: 6px 12px; border-radius: 100px;
  border: 1px solid rgba(28,61,46,0.18); background: rgba(255,255,255,0.6);
}
.adm-back:hover { background: rgba(28,61,46,0.06); color: var(--cyc-green); }

/* 密码门 */
.pw-gate { max-width: 400px; margin: 60px auto; }
.pw-gate-card {
  background: var(--cyc-surface-glass);
  backdrop-filter: blur(24px) saturate(1.6); -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border: 1px solid var(--cyc-border-glass);
  border-radius: var(--cyc-r-card-lg);
  padding: 28px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0 0 0.5px var(--cyc-inset-shine) inset;
}
.pw-gate-title { font-size: 18px; font-weight: 700; color: var(--cyc-text-strong); margin-bottom: 6px; }
.pw-gate-sub   { font-size: 13px; color: var(--cyc-text-muted); margin-bottom: 16px; }
.pw-input {
  width: 100%; padding: 10px 12px; font-size: 14px;
  background: rgba(255,255,255,0.9); color: var(--cyc-text);
  border: 1px solid rgba(0,0,0,0.10); border-radius: var(--cyc-r-inner);
  font-family: inherit;
}
.pw-input:focus { outline: 2px solid var(--cyc-green); outline-offset: 1px; border-color: var(--cyc-green); }
.pw-btn {
  width: 100%; margin-top: 12px; padding: 11px; cursor: pointer;
  background: var(--cyc-green); color: #fff;
  border: none; border-radius: var(--cyc-r-inner);
  font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
  font-family: inherit;
}
.pw-btn:hover { background: var(--cyc-green-2); }
.pw-btn:active { transform: scale(0.98); }
.pw-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.pw-err { color: var(--cyc-danger); font-size: 12px; margin-top: 10px; min-height: 16px; }

/* 控件条 */
.adm-controls { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.adm-pill {
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  background: rgba(255,255,255,0.7); color: var(--cyc-text-muted);
  border: 1px solid rgba(0,0,0,0.10); border-radius: 100px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  font-family: inherit;
}
.adm-pill:hover { background: rgba(255,255,255,0.9); }
.adm-pill.is-active { background: var(--cyc-green); color: #fff; border-color: var(--cyc-green); }

/* Summary cards */
.sum-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 24px; }
.sum-card {
  background: var(--cyc-surface-glass);
  backdrop-filter: blur(24px) saturate(1.6); -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border: 1px solid var(--cyc-border-glass);
  border-radius: var(--cyc-r-card);
  padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 0.5px var(--cyc-inset-shine) inset;
}
.sum-label {
  font-size: 11px; color: var(--cyc-text-muted);
  letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px;
  font-weight: 600;
}
.sum-value {
  font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--cyc-text-strong);
  font-feature-settings: 'tnum';
}
.sum-value.warm { color: var(--cyc-green); }
.sum-hint { font-size: 11px; color: var(--cyc-text-muted); margin-top: 2px; }

/* Section */
.adm-section { margin-bottom: 22px; }
.adm-section-title {
  font-size: 14px; font-weight: 700; letter-spacing: -0.01em;
  color: var(--cyc-text-strong);
  margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.adm-section-title .badge {
  font-size: 10px; padding: 2px 8px; border-radius: 100px;
  background: rgba(28,61,46,0.06); color: var(--cyc-text-muted);
  font-weight: 500; letter-spacing: 0.02em;
}

/* Sparkline */
.spark {
  display: flex; align-items: flex-end; gap: 3px; height: 70px; padding: 8px 12px;
  background: var(--cyc-surface-glass);
  border: 1px solid var(--cyc-border-glass);
  border-radius: var(--cyc-r-card);
  box-shadow: 0 0 0 0.5px var(--cyc-inset-shine) inset;
}
.spark-bar { flex: 1; min-width: 4px; background: var(--cyc-green); border-radius: 2px 2px 0 0; opacity: 0.85; }
.spark-bar:hover { opacity: 1; }
.spark-bar[data-count="0"] { background: rgba(28,61,46,0.10); }
.spark-tip {
  font-size: 10px; color: var(--cyc-text-muted);
  display: flex; justify-content: space-between; margin-top: 4px; padding: 0 12px;
  font-feature-settings: 'tnum';
}

/* List */
.list {
  background: var(--cyc-surface-glass);
  border: 1px solid var(--cyc-border-glass);
  border-radius: var(--cyc-r-card);
  padding: 4px;
  box-shadow: 0 0 0 0.5px var(--cyc-inset-shine) inset;
}
.list-row {
  display: grid; grid-template-columns: 1fr auto auto; gap: 12px;
  padding: 10px 14px; border-radius: var(--cyc-r-inner);
  font-size: 13px; align-items: center;
}
.list-row + .list-row { border-top: 1px solid rgba(0,0,0,0.05); }
.list-row:hover { background: rgba(255,255,255,0.6); }
.list-name { font-weight: 600; color: var(--cyc-text-strong); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-meta { color: var(--cyc-text-muted); font-size: 11px; }
.list-count {
  font-weight: 700; font-feature-settings: 'tnum';
  background: rgba(28,61,46,0.06); padding: 2px 10px; border-radius: 100px;
  font-size: 12px; color: var(--cyc-text-strong);
}
.list-count.warm {
  background: rgba(28,61,46,0.10);
  color: var(--cyc-green);
}

/* Recent log */
.log {
  background: rgba(255,255,255,0.5);
  border: 1px solid var(--cyc-border-glass);
  border-radius: var(--cyc-r-card);
  padding: 12px; max-height: 480px; overflow-y: auto;
  font-family: 'SF Mono', Menlo, ui-monospace, monospace; font-size: 11.5px;
  line-height: 1.7; color: var(--cyc-text-muted);
}
.log-line { padding: 2px 0; word-break: break-all; }
.log-ts { color: var(--cyc-text-faint); margin-right: 8px; font-feature-settings: 'tnum'; }
.log-ev { color: var(--cyc-green); margin-right: 8px; font-weight: 600; }
.log-pg { color: var(--cyc-text-strong); }
.log-meta { color: var(--cyc-text-faint); margin-left: 8px; font-size: 10.5px; }

.empty {
  text-align: center; color: var(--cyc-text-muted); padding: 32px 16px; font-size: 13px;
}

@media (max-width: 600px) {
  .sum-value { font-size: 24px; }
  .list-row  { grid-template-columns: 1fr auto; }
  .list-meta { display: none; }
}
</style>
</head>
<body class="aurora-canvas">

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="adm-wrap">
  <header class="adm-head">
    <div class="adm-title">📊 埋点数据 / Instrumentation</div>
    <a class="adm-back" href="/admin">← admin</a>
  </header>

  <!-- 密码门 -->
  <div id="pwGate" class="pw-gate">
    <div class="pw-gate-card">
      <div class="pw-gate-title">🔒 输入管理密码</div>
      <div class="pw-gate-sub">读取飞书事件流表 · 仅 admin 可见</div>
      <input id="pwInput" class="pw-input" type="password" autocomplete="current-password" placeholder="管理密码">
      <button id="pwBtn" class="pw-btn">查看数据</button>
      <div id="pwErr" class="pw-err"></div>
    </div>
  </div>

  <!-- dashboard -->
  <div id="dash" style="display:none">
    <div class="adm-controls">
      <button class="adm-pill" data-days="1">最近 24h</button>
      <button class="adm-pill is-active" data-days="7">最近 7 天</button>
      <button class="adm-pill" data-days="30">最近 30 天</button>
      <button class="adm-pill" data-days="90">最近 90 天</button>
    </div>

    <div class="sum-grid" id="sumGrid"></div>

    <div class="adm-section">
      <div class="adm-section-title">每日事件量 <span class="badge" id="dayBadge"></span></div>
      <div class="spark" id="spark"></div>
      <div class="spark-tip"><span id="sparkLeft"></span><span id="sparkRight"></span></div>
    </div>

    <div class="adm-section">
      <div class="adm-section-title">事件 Top（按次数）</div>
      <div class="list" id="byEvent"></div>
    </div>

    <div class="adm-section">
      <div class="adm-section-title">页面 Top（按事件量）</div>
      <div class="list" id="byPage"></div>
    </div>

    <div class="adm-section">
      <div class="adm-section-title">最近事件 <span class="badge">最新 50 条</span></div>
      <div class="log" id="recentLog"></div>
    </div>
  </div>
</div>

<script>
(function () {
  const pwInput = document.getElementById('pwInput');
  const pwBtn   = document.getElementById('pwBtn');
  const pwErr   = document.getElementById('pwErr');
  const pwGate  = document.getElementById('pwGate');
  const dash    = document.getElementById('dash');

  let currentPw = '';
  let currentDays = 7;

  pwBtn.onclick = () => doFetch(pwInput.value.trim());
  pwInput.onkeydown = (e) => { if (e.key === 'Enter') doFetch(pwInput.value.trim()); };

  document.querySelectorAll('.adm-pill').forEach((btn) => {
    btn.onclick = () => {
      document.querySelectorAll('.adm-pill').forEach((b) => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      currentDays = parseInt(btn.dataset.days, 10);
      doFetch(currentPw);
    };
  });

  async function doFetch(pw) {
    if (!pw) { pwErr.textContent = '请输入密码'; return; }
    pwErr.textContent = '';
    pwBtn.disabled = true;
    pwBtn.textContent = '加载中...';
    try {
      const res = await fetch('/api/admin/instrumentation-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, days: currentDays }),
      });
      const data = await res.json();
      if (!data.ok) {
        pwErr.textContent = data.error === 'unauthorized' ? '密码错误' : ('错误: ' + (data.msg || data.error));
        return;
      }
      currentPw = pw;
      pwGate.style.display = 'none';
      dash.style.display = '';
      render(data);
      window.cycTrack && cycTrack('instrumentation_view', { days: currentDays });
    } catch (err) {
      pwErr.textContent = '网络错误: ' + err.message;
    } finally {
      pwBtn.disabled = false;
      pwBtn.textContent = '查看数据';
    }
  }

  function render(data) {
    const s = data.summary || {};
    document.getElementById('sumGrid').innerHTML = `
      <div class="sum-card">
        <div class="sum-label">事件总数</div>
        <div class="sum-value warm">${s.total || 0}</div>
        <div class="sum-hint">${data.window.days} 天窗口</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">独立 session</div>
        <div class="sum-value">${s.unique_sessions || 0}</div>
        <div class="sum-hint">浏览器会话数</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">活跃页面</div>
        <div class="sum-value">${s.unique_pages || 0}</div>
        <div class="sum-hint">至少有 1 条事件的页面</div>
      </div>
    `;

    const days = data.by_day || [];
    const max = Math.max(1, ...days.map((d) => d.count));
    document.getElementById('spark').innerHTML = days
      .map((d) => `<div class="spark-bar" style="height:${(d.count / max) * 100}%" data-count="${d.count}" title="${d.date}: ${d.count}"></div>`)
      .join('');
    document.getElementById('sparkLeft').textContent = days[0]?.date || '';
    document.getElementById('sparkRight').textContent = days[days.length - 1]?.date || '';
    document.getElementById('dayBadge').textContent = `${days.length} 天 · 最高 ${max}`;

    const evs = data.by_event || [];
    document.getElementById('byEvent').innerHTML = evs.length
      ? evs.map((e) => `
        <div class="list-row">
          <div class="list-name">${escapeHtml(e.event)}</div>
          <div class="list-meta">最近 ${formatRel(e.last_at)}</div>
          <div class="list-count warm">${e.count}</div>
        </div>`).join('')
      : '<div class="empty">这个窗口里还没事件 —— 等用户访问 / 你自己点几下</div>';

    const pgs = data.by_page || [];
    document.getElementById('byPage').innerHTML = pgs.length
      ? pgs.map((p) => `
        <div class="list-row">
          <div class="list-name">${escapeHtml(p.page || '/')}</div>
          <div class="list-meta">${p.unique_sessions} 个 session</div>
          <div class="list-count">${p.count}</div>
        </div>`).join('')
      : '<div class="empty">无页面数据</div>';

    const rec = data.recent || [];
    document.getElementById('recentLog').innerHTML = rec.length
      ? rec.map((r) => `
        <div class="log-line">
          <span class="log-ts">${formatTs(r.ts)}</span>
          <span class="log-ev">${escapeHtml(r.event)}</span>
          <span class="log-pg">${escapeHtml(r.page || '')}</span>
          ${r.metadata ? `<span class="log-meta">· ${escapeHtml(truncate(r.metadata, 80))}</span>` : ''}
        </div>`).join('')
      : '<div class="empty">日志为空</div>';
  }

  function escapeHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function truncate(s, n) { s = String(s || ''); return s.length > n ? s.slice(0, n) + '…' : s; }
  function formatTs(ts) {
    const d = new Date(Number(ts));
    return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }
  function formatRel(ts) {
    const sec = (Date.now() - Number(ts)) / 1000;
    if (sec < 60)  return Math.floor(sec) + ' 秒前';
    if (sec < 3600) return Math.floor(sec / 60) + ' 分钟前';
    if (sec < 86400) return Math.floor(sec / 3600) + ' 小时前';
    return Math.floor(sec / 86400) + ' 天前';
  }
})();
</script>

<script src="/cyc-track.js" defer></script>
</body>
</html>
